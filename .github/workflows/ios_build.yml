name: Build iOS
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          brew install autoconf automake libtool pkg-config cmake
          # חובה להתקין packaging וגרסה ספציפית של Cython כדי למנוע קריסה
          pip install "Cython<3.0" buildozer kivy-ios packaging

      - name: Build with Buildozer
        run: |
          # יצירת הפרויקט - זה השלב הארוך (כ-30 דקות)
          yes | buildozer ios debug
        env:
          BUFFER_SIZE: 1024

      - name: Prepare Output
        run: |
          # אנחנו מוודאים שהפרויקט נוצר בנתיב הנכון
          cd .buildozer/ios/platform/kivy-ios
          python toolchain.py build kivy
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Project-Files
          # אנחנו מעלים את תיקיית ה-dist שבה נמצא פרויקט ה-Xcode הסופי
          path: .buildozer/ios/platform/kivy-ios/dist/
