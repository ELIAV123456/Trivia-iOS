name: Build iOS
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          brew install autoconf automake libtool pkg-config cmake
          # התקנת Cython בגרסה יציבה לקיבי
          pip install "Cython<3.0" buildozer kivy-ios packaging

      - name: Build with Buildozer
        run: |
          # ניקוי הורדות קודמות שאולי נכשלו
          rm -rf .buildozer/ios/cache
          # הרצה עם לוג מפורט כדי לראות איזה קובץ בדיוק נכשל בהורדה
          buildozer -v ios debug
          
      - name: Build with Buildozer
        run: |
          # הפקודה הזו כבר מריצה את ה-toolchain בפנים
          # אנחנו מוסיפים --verbose כדי לראות בדיוק איפה זה נתקע אם תהיה בעיה
          yes | buildozer --verbose ios debug
        env:
          BUFFER_SIZE: 1024

      - name: Cache Buildozer vars
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Verify and List Xcode Project
        run: |
          # פקודה זו תעזור לנו לוודא איפה הפרויקט נוצר באמת אם הבנייה נכשלת
          find .buildozer/ios/platform -name "*.xcodeproj" -type d

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Xcode-Project
          # ב-Buildozer ל-iOS, הפרויקט בד"כ נוצר בנתיב הזה:
          path: .buildozer/ios/platform/*/
