name: Build iOS App
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4  # עודכן ל-v4

      - name: Set up Python
        uses: actions/setup-python@v5 # עודכן ל-v5
        with:
          python-version: '3.10'

      - name: Install Kivy-ios and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy-ios
          brew install autoconf automake libtool pkg-config

      - name: Build Recipes
        run: |
          # זה השלב שלוקח זמן (בניית התשתית של פייתון לאייפון)
          toolchain build python3 kivy

      - name: Create Xcode Project
        run: |
          # מוודא שיש לך קובץ main.py בתיקייה הראשית
          toolchain create "MyKivyApp" .

      - name: Compile App
        run: |
          cd mykivyapp-ios
          xcodebuild build \
            -project mykivyapp.xcodeproj \
            -scheme mykivyapp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Upload Build
        uses: actions/upload-artifact@v4 # התיקון הקריטי כאן - v4
        with:
          name: ios-app-bundle
          path: mykivyapp-ios/build/Release-iphoneos/*.app
