name: Build iOS
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          brew install autoconf automake libtool pkg-config cmake
          # התקנת packaging ו-Cython בגרסה ספציפית למניעת שגיאות ה-mock
          pip install "Cython<3.0" buildozer kivy-ios packaging

      - name: Build with Buildozer
        run: |
          # כאן אנחנו יוצרים את הפרויקט
          yes | buildozer ios debug
        env:
          BUFFER_SIZE: 1024

      - name: Find and Build Xcode Project
        run: |
          # כאן התיקון האמיתי: אנחנו מחפשים איפה הפרויקט באמת נמצא
          # בדרך כלל: .buildozer/ios/platform/kivy-ios/dist/app/
          cd .buildozer/ios/platform/kivy-ios
          python toolchain.py build kivy
          
          # פקודה שמוודאת שהפרויקט נוצר ובודקת את הנתיב שלו
          find . -name "*.xcodeproj"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Package
          # אנחנו מעלים את כל תיקיית ה-platform כדי שלא נפספס כלום
          path: .buildozer/ios/platform/kivy-ios/dist/
