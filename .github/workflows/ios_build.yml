name: Build iOS App
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנת גרסאות ספציפיות כדי למנוע את שגיאת ה-urllib3 וה-Requests
          pip install "urllib3<2" "chardet<5" "requests<2.30"
          pip install "Cython<3.0" kivy-ios
          brew install autoconf automake libtool pkg-config

      - name: Full Build and Create
        run: |
          # 1. מנקים שאריות אם היו
          python -m kivy_ios.toolchain clean python3 kivy || true
          
          # 2. בונים מחדש את המתכונים (כאן זה ייקח זמן)
          python -m kivy_ios.toolchain build python3 kivy
          
          # 3. יצירת הפרויקט בתוך תיקייה נקייה לגמרי
          mkdir -p /tmp/empty_app
          echo "import kivy" > /tmp/empty_app/main.py
          mkdir -p output
          cd output
          python -m kivy_ios.toolchain create "MyKivyApp" /tmp/empty_app
          
          # 4. העתקת הקוד שלך פנימה
          cd ..
          cp -R ./*.py output/mykivyapp-ios/mykivyapp/

      - name: Final Xcode Build
        run: |
          cd output/mykivyapp-ios
          xcodebuild build \
            -project mykivyapp.xcodeproj \
            -scheme mykivyapp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
            
      - name: Upload Build
        uses: actions/upload-artifact@v4 # התיקון הקריטי כאן - v4
        with:
          name: ios-app-bundle
          path: mykivyapp-ios/build/Release-iphoneos/*.app
