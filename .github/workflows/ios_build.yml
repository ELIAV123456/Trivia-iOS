name: Build iOS App
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנת גרסאות ספציפיות כדי למנוע את שגיאת ה-urllib3 וה-Requests
          pip install "urllib3<2" "chardet<5" "requests<2.30"
          pip install "Cython<3.0" kivy-ios
          brew install autoconf automake libtool pkg-config

      - name: Full Build and Create
        run: |
          # 1. בנייה מפורשת של פייתון קודם כל
          python -m kivy_ios.toolchain build python3
          
          # 2. בנייה של Kivy (זה אמור להיות מהיר יותר עכשיו)
          python -m kivy_ios.toolchain build kivy
          
          # 3. הדפסת רשימת המתכונים המוכנים (ליתר ביטחון, כדי שנראה ב-Log)
          python -m kivy_ios.toolchain recipes
          
          # 4. יצירת תיקייה נקייה לגמרי בנתיב מוחלט
          mkdir -p /tmp/empty_app
          echo "import kivy" > /tmp/empty_app/main.py
          
          # 5. יצירת הפרויקט (שיניתי את הנתיב לתיקייה הנוכחית ללא 'output' כדי למנוע בלבול)
          python -m kivy_ios.toolchain create "MyKivyApp" /tmp/empty_app
          
          # 6. העתקת הקוד שלך פנימה
          cp -R ./*.py mykivyapp-ios/mykivyapp/
          

      - name: Full Build and Create
        run: |
          # 1. בנייה (במידה וצריך)
          python -m kivy_ios.toolchain build python3 kivy
          
          # 2. מחיקת תיקיות ישנות כדי למנוע את שגיאת ה-OutputDirExistsException
          rm -rf mykivyapp-ios
          rm -rf /tmp/empty_app
          
          # 3. יצירת תיקייה זמנית נקייה
          mkdir -p /tmp/empty_app
          echo "import kivy" > /tmp/empty_app/main.py
          
          # 4. יצירת הפרויקט מחדש
          python -m kivy_ios.toolchain create "MyKivyApp" /tmp/empty_app
          
          # 5. העתקת הקוד שלך פנימה
          cp -R ./*.py mykivyapp-ios/mykivyapp/

      - name: Final Xcode Build
        run: |
          # כאן היה התיקון - אנחנו נכנסים ישירות לתיקייה שנוצרה בראשית המאגר
          cd mykivyapp-ios
          xcodebuild build \
            -project mykivyapp.xcodeproj \
            -scheme mykivyapp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: mykivyapp-ios/build/Release-iphoneos/*.app
            
      - name: Upload Build
        uses: actions/upload-artifact@v4 # התיקון הקריטי כאן - v4
        with:
          name: ios-app-bundle
          path: mykivyapp-ios/build/Release-iphoneos/*.app
