name: Build iOS App (Kivy)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy-ios
          brew install autoconf automake libtool pkg-config

      - name: Create Xcode Project
        run: |
          toolchain create MyApp ./  # החלף את MyApp בשם האפליקציה שלך
          toolchain build python3 kivy

      - name: Xcode Build (No Sign)
        run: |
          cd myapp-ios
          xcodebuild -project myapp.xcodeproj -scheme myapp -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-app
          path: myapp-ios/build/Release-iphoneos/*.app
