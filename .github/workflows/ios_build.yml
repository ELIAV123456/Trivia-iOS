name: Build iOS
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # הוספתי כאן את packaging ו-setuptools שחסרים ל-kivy-ios
          pip install kivy-ios buildozer Cython==0.29.33 packaging setuptools

      - name: Install System Dependencies (Homebrew)
        run: |
          brew install autoconf automake libtool pkg-config

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy-ios buildozer Cython==0.29.33

      - name: Build with Buildozer
        run: |
          buildozer ios debug
        env:
          BUILDOZER_WARN_ON_ROOT: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Xcode-Project
          path: .buildozer/ios/platform/kivy-ios/dist/hostpython3/../
