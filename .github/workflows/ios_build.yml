name: Build iOS
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          brew install autoconf automake libtool pkg-config cmake
          pip install Cython==0.29.33 buildozer kivy-ios

      - name: Build with Buildozer
        run: |
          # פקודה זו עונה "yes" לכל השאלות של Buildozer באופן אוטומטי
          yes | buildozer ios debug
        env:
          # זה מונע קריסות של זיכרון בשרת
          BUFFER_SIZE: 1024

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Xcode-Project
          path: .buildozer/ios/platform/kivy-ios/  # הנתיב לפרויקט ה-Xcode
