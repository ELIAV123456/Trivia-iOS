name: Build iOS
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          brew install autoconf automake libtool pkg-config cmake
          pip install Cython==0.29.33 buildozer kivy-ios packaging

      - name: Build with Buildozer
        run: |
          # כאן אנחנו מריצים את הבנייה. זה השלב הארוך.
          yes | buildozer ios debug
        env:
          BUFFER_SIZE: 1024

      - name: Compile Xcode Project
        run: |
          # התיקון הקריטי: נכנסים לנתיב שבו הפרויקט באמת נמצא
          cd .buildozer/ios/platform/kivy-ios
          # פקודה שבונה את ה-Xcode בלי לחפש חתימה דיגיטלית (כי אין לנו Mac)
          python toolchain.py build kivy
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Package
          # אנחנו מעלים את כל התיקייה שנוצרה כדי שתוכל להוריד אותה למחשב
          path: .buildozer/ios/platform/kivy-ios/
