name: Build iOS App
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4  # עודכן ל-v4

      - name: Set up Python
        uses: actions/setup-python@v5 # עודכן ל-v5
        with:
          python-version: '3.10'

      - name: Install Kivy-ios and Dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנת הספריות ועדכון הספרייה הבעייתית לגרסה שתומכת בפייתון 3 טוב יותר
          pip install "Cython<3.0" kivy-ios binaryornot cookiecutter
          brew install autoconf automake libtool pkg-config

      - name: Build Recipes
        run: |
          # הרצת ה-toolchain כמודול פייתון כדי לעקוף בעיות נתיבים
          python -m kivy_ios.toolchain build python3 kivy

      - name: Create Xcode Project (Safe Mode)
        run: |
          # 1. יוצרים תיקייה ריקה כדי ש-toolchain לא יתרסק על קבצים קיימים
          mkdir empty_dir
          touch empty_dir/main.py
          
          # 2. יוצרים את פרויקט ה-Xcode מהתיקייה הריקה
          python -m kivy_ios.toolchain create "MyKivyApp" empty_dir
          
          # 3. עכשיו מעתיקים את הקוד האמיתי שלך לתוך הפרויקט שנוצר
          # הנתיב הוא בדרך כלל mykivyapp-ios/YourApp
          cp -R ./*.py mykivyapp-ios/mykivyapp/
          # אם יש לך תמונות או פונטים, העתק גם אותם:
          # cp -R ./assets mykivyapp-ios/mykivyapp/ || true

      - name: Compile App
        run: |
          cd mykivyapp-ios
          xcodebuild build \
            -project mykivyapp.xcodeproj \
            -scheme mykivyapp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Upload Build
        uses: actions/upload-artifact@v4 # התיקון הקריטי כאן - v4
        with:
          name: ios-app-bundle
          path: mykivyapp-ios/build/Release-iphoneos/*.app
