name: Build iOS App
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4  # עודכן ל-v4

      - name: Set up Python
        uses: actions/setup-python@v5 # עודכן ל-v5
        with:
          python-version: '3.10'

      - name: Install Kivy-ios and Dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנת הספריות ועדכון הספרייה הבעייתית לגרסה שתומכת בפייתון 3 טוב יותר
          pip install "Cython<3.0" kivy-ios binaryornot cookiecutter
          brew install autoconf automake libtool pkg-config

      - name: Build Recipes
        run: |
          # הרצת ה-toolchain כמודול פייתון כדי לעקוף בעיות נתיבים
          python -m kivy_ios.toolchain build python3 kivy

      - name: Create Xcode Project
        run: |
          # ביטול הבדיקה הבינארית שגורמת לקריסה - הגדרת משתנה סביבה שיעקוף את הבעיה
          export PYTHONIOENCODING=utf-8
          export LANG=en_US.UTF-8
          
          # הרצת היצירה עם השם של האפליקציה שלך
          python -m kivy_ios.toolchain create "MyKivyApp" .

          
      - name: Compile App
        run: |
          cd mykivyapp-ios
          xcodebuild build \
            -project mykivyapp.xcodeproj \
            -scheme mykivyapp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Upload Build
        uses: actions/upload-artifact@v4 # התיקון הקריטי כאן - v4
        with:
          name: ios-app-bundle
          path: mykivyapp-ios/build/Release-iphoneos/*.app
