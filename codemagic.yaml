workflows:
  ios-native-workflow:
    name: iOS Native Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    scripts:
      - name: Build and Package
        script: |
          # כאן אנחנו בונים את האפליקציה ללא חתימה דיגיטלית (כי אנחנו בגרסה החינמית)
          xcodebuild build \
            -workspace *.xcworkspace \
            -scheme YourProjectName \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
    artifacts:
      - build/Release-iphoneos/*.app
