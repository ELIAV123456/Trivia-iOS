workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: <your_integration_name> # אפשר למחוק אם אין לך חיבור רשמי
    scripts:
      - name: Install dependencies
        script: | 
          # אם זה פלאטר, שים פה flutter packages get
          # אם זה ריאקט נייטיב, שים פה npm install
          echo "Installing dependencies..."
      - name: Build iOS
        script: | 
          # הפקודה שבונה את האפליקציה (למשל flutter build ios --release --no-codesign)
          echo "Building..."
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com # שים פה את המייל שלך
