<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Quiz V3.0</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .container { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; min-height: 520px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; position: relative; display: flex; flex-direction: column; }

        /* V - תיקון גלגלת לצד שמאל במחשב */
        .settings-btn { position: absolute; top: 20px; left: 20px; right: auto; background: none; border: none; font-size: 28px; cursor: pointer; z-index: 1000; display: none; }

        .screen { display: none; flex-direction: column; flex-grow: 1; justify-content: center; }
        .active { display: flex; }

        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.5; }

        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-exit { background: var(--exit); }

        /* V - שורת זהב בלוח תוצאות */
        .score-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #444; border-radius: 8px; margin-bottom: 4px; font-size: 18px; }
        .my-row-gold { background: rgba(255, 215, 0, 0.2) !important; border: 2px solid var(--gold) !important; color: var(--gold) !important; font-weight: bold; }

        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 15px 0; }
        .emoji-opt { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 8px; border: 2px solid transparent; }
        .emoji-active { border-color: var(--blue); background: rgba(33, 150, 243, 0.2); }

        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 15px 0; font-size: 22px; font-weight: bold; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        <button id="gear-btn" class="settings-btn">⚙️</button>

        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Quiz</h1>
            <p id="user-welcome" style="color:var(--blue); font-weight:bold;"></p>
            <div id="auth-ui">
                <button class="btn-green" id="btn-login-go">כניסה</button>
                <button class="btn-purple" id="btn-reg-go" style="background:var(--blue)">הרשמה</button>
            </div>
            <div id="game-ui" style="display:none">
                <button class="btn-green" id="btn-play-normal">משחק רגיל</button>
                <button class="btn-purple" id="btn-play-pvp">⚔️ קרב PVP</button>
                <button style="background:var(--orange)" id="btn-leaderboard">🏆 לוח תוצאות</button>
                <button class="btn-exit" id="btn-logout">התנתק</button>
            </div>
        </div>

        <div id="score-screen" class="screen">
            <h2>🏆 דירוג שחקנים</h2>
            <div id="leaderboard-list" style="max-height: 280px; overflow-y: auto; margin-bottom: 10px;"></div>
            <button style="background:#555" id="btn-score-back">חזרה</button>
        </div>

        <div id="settings-screen" class="screen">
            <h2>ערוך פרופיל</h2>
            <input type="text" id="new-name" placeholder="שם חדש">
            <div class="emoji-grid" id="emoji-picker"></div>
            <button class="btn-green" id="btn-save-settings">שמור</button>
            <button style="background:#555" id="btn-settings-back">ביטול</button>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between;">
                <span id="q-idx">1/10</span>
                <span id="timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="ans-input" placeholder="הקלד תשובה...">
            <button class="btn-green" id="btn-submit-ans">שלח תשובה</button>
            <button id="btn-exit-game" class="btn-exit" style="background:#555; margin-top:5px;">❌ יציאה מהמשחק</button>
        </div>

        <div id="auth-screen" class="screen">
            <h2 id="auth-title">כניסה</h2>
            <input type="text" id="auth-u" placeholder="שם משתמש">
            <input type="password" id="auth-p" placeholder="סיסמה">
            <button class="btn-green" id="btn-auth-submit">אישור</button>
            <button style="background:#555" id="btn-auth-back">חזרה</button>
        </div>
    </div>

    <script type="py">
import js, hashlib, random, json, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, cur_idx, cur_score, timer_val, t_task = [], 0, 0, 15, None
room_id, is_pvp, am_p1, game_active = None, False, False, False
selected_emoji = js.localStorage.getItem("emoji") or "👤"
EMOJIS = ["🦁","🥷","🤖","🦄","🐯","🐸","🐱","🐶","🦊","🐼","🐨","🐝","🎨","🚀","🎸","🍕","⚽","🎮","👑","🔥","💎","👻","👾","😎"]

def switch(sid):
    js.document.getElementById("gear-btn").style.display = "block" if sid == "menu-screen" else "none"
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")

def update_ui():
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("user-welcome").innerText = f"{em} שלום {u}" if u else ""
    js.document.getElementById("auth-ui").style.display = "none" if u else "block"
    js.document.getElementById("game-ui").style.display = "block" if u else "none"

def build_emojis():
    cont = js.document.getElementById("emoji-picker")
    cont.innerHTML = ""
    for em in EMOJIS:
        span = js.document.createElement("span")
        span.className = "emoji-opt" + (" emoji-active" if em == selected_emoji else "")
        span.innerText = em
        span.onclick = create_proxy(lambda e, v=em: set_em(v))
        cont.appendChild(span)

def set_em(v):
    global selected_emoji
    selected_emoji = v
    build_emojis()

async def get_q():
    try:
        res = await pyfetch(f"{DB}questions.json")
        d = await res.json()
        return d if isinstance(d, list) else d.get("questions", [])
    except: return []

async def start_normal(e):
    global questions, cur_idx, cur_score, is_pvp, game_active
    cur_idx, cur_score, is_pvp, game_active = 0, 0, False, True
    all_q = await get_q()
    if not all_q: return js.alert("שגיאה בטעינת שאלות")
    questions = random.sample(all_q, 10)
    switch("game-screen")
    js.document.getElementById("btn-submit-ans").disabled = False
    load_q()

async def start_pvp(e):
    global questions, cur_idx, cur_score, is_pvp, room_id, am_p1, game_active
    u = js.localStorage.getItem("user")
    cur_idx, cur_score, is_pvp, game_active = 0, 0, True, False
    all_q = await get_q()
    if not all_q: return js.alert("שגיאה בטעינת שאלות")
    questions = random.sample(all_q, 10)
    room_id = f"r_{int(js.Date.now())}"
    am_p1 = True
    await pyfetch(f"{DB}rooms/{room_id}.json", method="PUT", body=json.dumps({"p1": u, "status": "waiting", "qs": questions}))
    switch("game-screen")
    js.document.getElementById("q-text").innerText = "מחכה ליריב..."
    js.document.getElementById("btn-submit-ans").disabled = True
    asyncio.ensure_future(wait_pvp())

async def wait_pvp():
    global game_active
    while not game_active and room_id:
        await asyncio.sleep(2)
        res = await pyfetch(f"{DB}rooms/{room_id}.json")
        d = await res.json()
        if d and d.get("status") == "active":
            game_active = True
            js.document.getElementById("btn-submit-ans").disabled = False
            load_q()

async def exit_game(e):
    global room_id, game_active, t_task
    if room_id and am_p1:
        await pyfetch(f"{DB}rooms/{room_id}.json", method="DELETE")
    if t_task: js.clearInterval(t_task)
    room_id, game_active = None, False
    switch("menu-screen")

def load_q():
    global timer_val, t_task
    if cur_idx >= 10: asyncio.ensure_future(end_game()); return
    js.document.getElementById("q-idx").innerText = f"{cur_idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[cur_idx]['q']
    js.document.getElementById("ans-input").value = ""
    timer_val = 15
    if t_task: js.clearInterval(t_task)
    t_task = js.setInterval(create_proxy(tick), 1000)

async def tick():
    global timer_val
    timer_val -= 1
    js.document.getElementById("timer").innerText = f"⏱️ {timer_val}"
    if timer_val <= 0: await check_ans()

async def check_ans(e=None):
    global cur_idx, cur_score, t_task
    if not game_active and is_pvp: return
    if t_task: js.clearInterval(t_task)
    ans = js.document.getElementById("ans-input").value.strip().lower()
    if ans == str(questions[cur_idx]['a']).lower() and ans != "":
        cur_score += 1
        js.document.body.style.background = "green"
    else: js.document.body.style.background = "red"
    js.setTimeout(create_proxy(lambda: setattr(js.document.body.style, 'background', '#1e1e2e')), 400)
    cur_idx += 1
    load_q()

async def end_game():
    u = js.localStorage.getItem("user")
    if u:
        res = await pyfetch(f"{DB}users/{u}.json")
        d = await res.json()
        new_total = (d.get("points", 0) if d else 0) + cur_score
        await pyfetch(f"{DB}users/{u}.json", method="PATCH", body=json.dumps({"points": new_total}))
    js.alert(f"נגמר! צברת {cur_score}")
    switch("menu-screen")

async def show_scores(e):
    switch("score-screen")
    res = await pyfetch(f"{DB}users.json")
    users = await res.json() or {}
    my_u = js.localStorage.getItem("user")
    sorted_u = sorted(users.items(), key=lambda x: x[1].get('points',0), reverse=True)
    h = ""
    for idx, (name, data) in enumerate(sorted_u[:10]):
        # V - RANK וכוכב זהב
        is_me = (name == my_u)
        star = "⭐ " if is_me else ""
        cls = "score-row my-row-gold" if is_me else "score-row"
        h += f'<div class="{cls}"><span>#{idx+1} {star}{name}</span><span>{data.get("points",0)}</span></div>'
    js.document.getElementById("leaderboard-list").innerHTML = h

# חיבורים
js.document.getElementById("btn-play-normal").onclick = create_proxy(start_normal)
js.document.getElementById("btn-play-pvp").onclick = create_proxy(start_pvp)
js.document.getElementById("btn-submit-ans").onclick = create_proxy(check_ans)
js.document.getElementById("btn-exit-game").onclick = create_proxy(exit_game)
js.document.getElementById("btn-leaderboard").onclick = create_proxy(show_scores)
js.document.getElementById("btn-score-back").onclick = lambda e: switch("menu-screen")
js.document.getElementById("gear-btn").onclick = lambda e: (build_emojis(), switch("settings-screen"))
js.document.getElementById("btn-save-settings").onclick = lambda e: (js.localStorage.setItem("emoji", selected_emoji), js.localStorage.setItem("user", js.document.getElementById("new-name").value or js.localStorage.getItem("user")), update_ui(), switch("menu-screen"))
js.document.getElementById("btn-logout").onclick = lambda e: (js.localStorage.removeItem("user"), update_ui())
js.document.getElementById("btn-login-go").onclick = lambda e: (setattr(js.document.getElementById("auth-title"),"innerText","כניסה"), switch("auth-screen"))
js.document.getElementById("btn-reg-go").onclick = lambda e: (setattr(js.document.getElementById("auth-title"),"innerText","הרשמה"), switch("auth-screen"))
js.document.getElementById("btn-auth-back").onclick = lambda e: switch("menu-screen")

async def auth_submit(e):
    u, p = js.document.getElementById("auth-u").value.strip(), js.document.getElementById("auth-p").value.strip()
    if not u or not p: return
    hp = hashlib.sha256(p.encode()).hexdigest()
    if js.document.getElementById("auth-title").innerText == "כניסה":
        res = await pyfetch(f"{DB}users/{u}.json")
        d = await res.json()
        if d and d.get("p") == hp: js.localStorage.setItem("user", u); update_ui(); switch("menu-screen")
        else: js.alert("שגיאה")
    else:
        await pyfetch(f"{DB}users/{u}.json", method="PUT", body=json.dumps({"p":hp, "points":0}))
        js.localStorage.setItem("user", u); update_ui(); switch("menu-screen")

js.document.getElementById("btn-auth-submit").onclick = create_proxy(auth_submit)
update_ui()
    </script>
</body>
</html>
