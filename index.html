<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Quiz Pro V3</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { 
            --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; 
            --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; 
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; 
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .container { 
            background: var(--card); padding: 25px; border-radius: 25px; 
            width: 90%; max-width: 450px; min-height: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; 
            border: 1px solid #444; position: relative; display: flex; flex-direction: column;
        }

        /* גלגל שיניים - מיקום קבוע בצד שמאל למעלה */
        .settings-btn { 
            position: absolute; top: 20px; left: 20px; 
            background: none; border: none; font-size: 28px; 
            cursor: pointer; z-index: 100; display: none; 
        }

        .screen { display: none; flex-direction: column; flex-grow: 1; justify-content: center; }
        .active { display: flex; }

        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.5; background: #555 !important; cursor: not-allowed; }

        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-exit { background: var(--exit); }

        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 15px 0; font-size: 22px; font-weight: bold; border: 1px solid #444; }
        
        /* לוח תוצאות */
        .my-row { background: rgba(255, 215, 0, 0.2) !important; border: 2px solid var(--gold) !important; color: var(--gold) !important; font-weight: bold; }
        .rank-badge { border-radius: 50%; width: 25px; height: 25px; display: inline-flex; align-items: center; justify-content: center; margin-left: 10px; background: #444; font-size: 12px; }
        .rank-1 { background: var(--gold); color: #000; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .waiting-text { animation: pulse 1.5s infinite; color: var(--orange); }
    </style>
</head>
<body>
    <audio id="snd-correct" src="sounds/correct.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="sounds/wrong.mp3" preload="auto"></audio>

    <div class="container">
        <button id="gear-btn" class="settings-btn">⚙️</button>

        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Quiz</h1>
            <p id="user-welcome" style="color:var(--blue);"></p>
            <div id="auth-ui">
                <button class="btn-green" id="btn-go-login">כניסה</button>
                <button class="btn-purple" id="btn-go-reg" style="background:var(--blue)">הרשמה</button>
            </div>
            <div id="game-ui" style="display:none">
                <button class="btn-green" id="btn-start-normal">משחק רגיל</button>
                <button class="btn-purple" id="btn-start-pvp">⚔️ קרב PVP</button>
                <button style="background:var(--orange)" id="btn-scores">לוח תוצאות</button>
                <button class="btn-exit" id="btn-logout">התנתק</button>
            </div>
        </div>

        <div id="settings-screen" class="screen">
            <h2>הגדרות פרופיל</h2>
            <input type="text" id="set-name" placeholder="שם חדש">
            <p>בחר אימוג'י:</p>
            <input type="text" id="set-emoji" placeholder="הכנס אימוג'י מהמקלדת" maxlength="2">
            <button class="btn-green" id="btn-save-settings">שמור</button>
            <button style="background:#555" id="btn-settings-back">חזרה</button>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between;">
                <span id="q-idx">1/10</span>
                <span id="game-timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text">טוען...</div>
            <div id="feedback" style="height:25px; font-weight:bold;"></div>
            <input type="text" id="ans-input" placeholder="הקלד תשובה...">
            <button class="btn-green" id="btn-check">בדוק</button>
            <button class="btn-exit" id="btn-quit" style="background:#555">צא ושמור</button>
        </div>

        <div id="score-screen" class="screen">
            <h1>🏆 מובילים</h1>
            <div id="leaderboard" style="text-align:right; margin-bottom:10px;"></div>
            <button style="background:#555" id="btn-score-back">חזרה</button>
        </div>

        <div id="auth-screen" class="screen">
            <h1 id="auth-title">כניסה</h1>
            <input type="text" id="auth-u" placeholder="שם משתמש">
            <input type="password" id="auth-p" placeholder="סיסמה">
            <button class="btn-green" id="btn-auth-submit">אישור</button>
            <button style="background:#555" id="btn-auth-back">חזרה</button>
        </div>

        <div id="result-screen" class="screen">
            <h2>סיכום קרב</h2>
            <div class="q-card">
                <div id="res-my">הציון שלך: 0</div>
                <div id="res-op" class="waiting-text">ממתין ליריב...</div>
            </div>
            <p id="res-status"></p>
        </div>
    </div>

    <script type="py">
import js, hashlib, random, json, re, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
q_list, cur_idx, cur_score, timer, t_task = [], 0, 0, 15, None
room_id, is_pvp, am_p1, active = None, False, False, False

def play_s(id):
    try:
        s = js.document.getElementById(id)
        s.currentTime = 0
        s.play()
    except: pass

def show(sid):
    global active
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")
    # גלגל שיניים רק בתפריט
    js.document.getElementById("gear-btn").style.display = "block" if sid == "menu-screen" else "none"
    if sid != "game-screen": active = False

def update_ui():
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("user-welcome").innerText = f"{em} שלום {u}" if u else ""
    js.document.getElementById("auth-ui").style.display = "none" if u else "block"
    js.document.getElementById("game-ui").style.display = "block" if u else "none"

async def get_questions():
    res = await pyfetch(f"{DB}questions.json")
    data = await res.json()
    return data if isinstance(data, list) else data.get("questions", [])

async def start_normal(e):
    global q_list, cur_idx, cur_score, is_pvp, active
    cur_idx, cur_score, is_pvp, active = 0, 0, False, True
    show("game-screen")
    all_q = await get_questions()
    q_list = random.sample(all_q, 10)
    load_q()

async def start_pvp(e):
    global q_list, cur_idx, cur_score, is_pvp, room_id, am_p1, active
    u = js.localStorage.getItem("user")
    cur_idx, cur_score, is_pvp, active = 0, 0, True, False
    show("game-screen")
    js.document.getElementById("btn-check").disabled = True
    js.document.getElementById("q-text").innerHTML = "<span class='waiting-text'>מחפש יריב...</span>"
    
    rooms = await (await pyfetch(f"{DB}rooms.json")).json() or {}
    now = int(js.Date.now())
    found = None
    for rid, rd in rooms.items():
        if rd.get("status") == "waiting" and rd.get("p1") != u:
            found = rid; break
    
    if found:
        am_p1, room_id = False, found
        await pyfetch(f"{DB}rooms/{found}.json", method="PATCH", body=json.dumps({"p2":u, "status":"active"}))
        rd = await (await pyfetch(f"{DB}rooms/{found}.json")).json()
        q_list, active = rd['qs'], True
        js.document.getElementById("btn-check").disabled = False
        load_q()
    else:
        am_p1, room_id = True, f"r_{now}"
        all_q = await get_questions()
        q_list = random.sample(all_q, 10)
        await pyfetch(f"{DB}rooms/{room_id}.json", method="PUT", body=json.dumps({
            "p1":u, "status":"waiting", "qs":q_list, "p1s":-1, "p2s":-1, "pulse":now
        }))
        asyncio.ensure_future(wait_op())

async def wait_op():
    global active
    while not active and room_id:
        await asyncio.sleep(2)
        d = await (await pyfetch(f"{DB}rooms/{room_id}.json")).json()
        if d and d.get("status") == "active":
            active = True
            js.document.getElementById("btn-check").disabled = False
            load_q()

def load_q():
    global timer, t_task
    if cur_idx >= 10: asyncio.ensure_future(end_game()); return
    js.document.getElementById("q-idx").innerText = f"{cur_idx+1}/10"
    js.document.getElementById("q-text").innerText = q_list[cur_idx]['q']
    js.document.getElementById("ans-input").value = ""
    js.document.getElementById("feedback").innerText = ""
    js.document.getElementById("btn-check").disabled = False
    timer = 15
    if t_task: js.clearInterval(t_task)
    t_task = js.setInterval(create_proxy(tick), 1000)

async def tick():
    global timer
    timer -= 1
    js.document.getElementById("game-timer").innerText = f"⏱️ {timer}"
    if timer <= 0: await check_ans()

async def check_ans(e=None):
    global cur_idx, cur_score, t_task
    if t_task: js.clearInterval(t_task)
    js.document.getElementById("btn-check").disabled = True
    ans = js.document.getElementById("ans-input").value.strip().lower()
    correct = str(q_list[cur_idx]['a']).lower()
    
    if ans == correct and ans != "":
        cur_score += 1
        play_s("snd-correct")
        js.document.getElementById("feedback").innerHTML = "<span style='color:var(--green)'>נכון!</span>"
    else:
        play_s("snd-wrong")
        js.document.getElementById("feedback").innerHTML = f"<span style='color:var(--exit)'>טעות! {correct}</span>"
    
    cur_idx += 1
    js.setTimeout(create_proxy(load_q), 1000)

async def save_pts(p):
    u = js.localStorage.getItem("user")
    if not u or p <= 0: return
    d = await (await pyfetch(f"{DB}users/{u}.json")).json() or {"pts":0}
    await pyfetch(f"{DB}users/{u}.json", method="PATCH", body=json.dumps({"pts": d.get("pts",0) + p}))

async def end_game():
    global active
    active = False
    if not is_pvp:
        await save_pts(cur_score)
        js.alert(f"הסתיים! צברת {cur_score} נקודות")
        show("menu-screen")
    else:
        show("result-screen")
        js.document.getElementById("res-my").innerText = f"הציון שלך: {cur_score}"
        field = "p1s" if am_p1 else "p2s"
        await pyfetch(f"{DB}rooms/{room_id}.json", method="PATCH", body=json.dumps({field: cur_score}))
        asyncio.ensure_future(result_loop())

async def result_loop():
    for _ in range(15):
        await asyncio.sleep(2)
        d = await (await pyfetch(f"{DB}rooms/{room_id}.json")).json()
        if not d: break
        p1s, p2s = d.get("p1s"), d.get("p2s")
        if p1s != -1 and p2s != -1:
            my, op = (p1s, p2s) if am_p1 else (p2s, p1s)
            js.document.getElementById("res-op").innerText = f"ציון יריב: {op}"
            if my > op:
                js.document.getElementById("res-status").innerText = "🏆 ניצחת! הנקודות נשמרו."
                await save_pts(my)
            elif my < op:
                js.document.getElementById("res-status").innerText = "😞 הפסדת. לא נוספו נקודות."
            else:
                js.document.getElementById("res-status").innerText = "🤝 תיקו! שניכם קיבלתם נקודות."
                await save_pts(my)
            break
    await asyncio.sleep(3)
    if am_p1: await pyfetch(f"{DB}rooms/{room_id}.json", method="DELETE")
    show("menu-screen")

async def show_leaderboard(e):
    u_me = js.localStorage.getItem("user")
    show("score-screen")
    users = await (await pyfetch(f"{DB}users.json")).json() or {}
    sorted_u = sorted(users.items(), key=lambda x: x[1].get('pts', 0), reverse=True)[:10]
    h = ""
    for i, (name, data) in enumerate(sorted_u):
        cls = "my-row" if name == u_me else ""
        h += f"<div class='{cls}' style='padding:10px; border-bottom:1px solid #444; display:flex; justify-content:space-between;'>"
        h += f"<span><span class='rank-badge {'rank-1' if i==0 else ''}'>{i+1}</span>{name}</span>"
        h += f"<span>{data.get('pts',0)}</span></div>"
    js.document.getElementById("leaderboard").innerHTML = h

# הגדרות ואימות
async def auth(e):
    u = js.document.getElementById("auth-u").value.strip()
    p = js.document.getElementById("auth-p").value.strip()
    if not u or not p: return
    hp = hashlib.sha256(p.encode()).hexdigest()
    res = await pyfetch(f"{DB}users/{u}.json")
    data = await res.json()
    if js.document.getElementById("auth-title").innerText == "כניסה":
        if data and data.get("p") == hp:
            js.localStorage.setItem("user", u); update_ui(); show("menu-screen")
        else: js.alert("פרטים שגויים")
    else:
        await pyfetch(f"{DB}users/{u}.json", method="PUT", body=json.dumps({"p":hp, "pts":0}))
        js.localStorage.setItem("user", u); update_ui(); show("menu-screen")

# חיווט
js.document.getElementById("btn-start-normal").onclick = create_proxy(start_normal)
js.document.getElementById("btn-start-pvp").onclick = create_proxy(start_pvp)
js.document.getElementById("btn-check").onclick = create_proxy(check_ans)
js.document.getElementById("btn-scores").onclick = create_proxy(show_leaderboard)
js.document.getElementById("btn-auth-submit").onclick = create_proxy(auth)
js.document.getElementById("btn-logout").onclick = create_proxy(lambda e: (js.localStorage.removeItem("user"), update_ui()))
js.document.getElementById("gear-btn").onclick = create_proxy(lambda e: show("settings-screen"))
js.document.getElementById("btn-save-settings").onclick = create_proxy(lambda e: (js.localStorage.setItem("emoji", js.document.getElementById("set-emoji").value), js.localStorage.setItem("user", js.document.getElementById("set-name").value or js.localStorage.getItem("user")), update_ui(), show("menu-screen")))
js.document.getElementById("btn-go-login").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"),"innerText","כניסה"), show("auth-screen")))
js.document.getElementById("btn-go-reg").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"),"innerText","הרשמה"), show("auth-screen")))
js.document.getElementById("btn-quit").onclick = create_proxy(lambda e: asyncio.ensure_future(end_game()))
js.document.getElementById("btn-score-back").onclick = create_proxy(lambda e: show("menu-screen"))
js.document.getElementById("btn-settings-back").onclick = create_proxy(lambda e: show("menu-screen"))
js.document.getElementById("btn-auth-back").onclick = create_proxy(lambda e: show("menu-screen"))

update_ui()
    </script>
</body>
</html>
