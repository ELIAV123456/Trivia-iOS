<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Quiz Pro V1.2</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { 
            --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; 
            --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; 
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; 
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; box-sizing: border-box; position: relative; }
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }
        
        .settings-icon { position: absolute; top: 20px; left: 20px; font-size: 24px; cursor: pointer; display: none; z-index: 10; }
        
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-exit { background: var(--exit); }
        
        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 10px 0; min-height: 90px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 1px solid #444; }
        
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #444; margin: 5px 0; border-radius: 10px; }
        .my-row { background: rgba(255, 215, 0, 0.15) !important; border: 2px solid var(--gold) !important; color: var(--gold) !important; }
        
        .rank-badge { border-radius: 50%; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; margin-left: 10px; color: white; font-weight: bold; background: #444; }
        .rank-1 { background: var(--gold); color: black; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.4s ease-in-out; border: 2px solid var(--exit) !important; }

        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .emoji-item { font-size: 30px; cursor: pointer; padding: 5px; border-radius: 8px; }
        .emoji-item:hover { background: #444; }
        
        .room-item { background: #33334d; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .waiting { animation: pulse 1.5s infinite; color: var(--orange); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <audio id="snd-correct" src="sounds/correct.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="sounds/wrong.mp3" preload="auto"></audio>

    <div class="container">
        <div id="gear-btn" class="settings-icon">⚙️</div>

        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Quiz</h1>
            <p id="hello-user"></p>
            <div id="logged-in-ui" style="display:none">
                <button class="btn-green" id="start-game-btn">משחק רגיל</button>
                <button class="btn-purple" id="start-pvp-btn">⚔️ קרב 1 על 1</button>
                <button style="background:var(--orange)" id="view-scores-btn">לוח תוצאות</button>
            </div>
            <div id="logged-out-ui">
                <button class="btn-green" id="go-login-btn">התחברות</button>
                <button class="btn-blue" id="go-reg-btn" style="background:var(--blue)">הרשמה</button>
            </div>
        </div>

        <div id="lobby-screen" class="screen">
            <h2>🎮 לובי חדרים</h2>
            <div id="rooms-list"></div>
            <button class="btn-green" id="create-room-btn">➕ צור חדר חדש</button>
            <button style="background:#555" id="lobby-back">חזרה</button>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <span id="q-count">1/10</span>
                <span id="game-score-display">🏆 0</span>
                <span id="timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text"></div>
            <div id="game-feedback" style="min-height:40px; font-weight:bold; margin-bottom:5px;"></div>
            <input type="text" id="game-ans" placeholder="הקלד תשובה...">
            <button class="btn-green" id="game-check-btn">בדוק</button>
            <button class="btn-exit" id="game-quit-btn" style="background:#555">🚪 צא ושמור</button>
        </div>

        <div id="score-screen" class="screen">
            <h1>🏆 טבלת אלופים</h1>
            <div id="leaderboard-content" style="text-align: right;"></div>
            <button style="background:#555" id="score-back">חזרה</button>
        </div>

        <div id="settings-screen" class="screen">
            <h2>⚙️ הגדרות</h2>
            <input type="text" id="set-new-name" placeholder="שם משתמש חדש">
            <p>בחר אימוג'י:</p>
            <div id="emoji-list" class="emoji-grid"></div>
            <button class="btn-green" id="save-settings-btn">שמור</button>
            <button class="btn-exit" id="logout-btn">התנתק</button>
            <button style="background:#555" id="settings-back">חזרה</button>
        </div>

        <div id="result-screen" class="screen">
            <h1 id="result-title">סיכום</h1>
            <div class="q-card" style="flex-direction:column;">
                <div id="my-final-score"></div>
                <div id="op-final-score" class="waiting">ממתין ליריב...</div>
            </div>
        </div>

        <div id="auth-screen" class="screen">
            <h1 id="auth-title">כניסה</h1>
            <input type="text" id="auth-u" placeholder="שם משתמש">
            <input type="password" id="auth-p" placeholder="סיסמה">
            <button class="btn-green" id="auth-submit">אישור</button>
            <button style="background:#555" id="auth-back">חזרה</button>
        </div>
    </div>

<script type="py">
import js, hashlib, random, json, re, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB_URL = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, idx, score, timer_val, timer_event = [], 0, 0, 15, None
current_room_id, is_pvp, i_am_p1, game_active = None, False, False, False
EMOJIS = ["🦁","🥷","🤖","🦄","🐯","🐸","🐱","🐶","🦊","🐼"]

def play_s(sid):
    # צליל יופעל רק אם אנחנו במסך המשחק
    if js.document.getElementById("game-screen").classList.contains("active"):
        try:
            a = js.document.getElementById(sid)
            a.currentTime = 0
            a.play()
        except: pass

def switch_screen(sid):
    global game_active
    js.document.getElementById("gear-btn").style.display = "block" if sid == "menu-screen" and js.localStorage.getItem("user") else "none"
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")
    if sid != "game-screen": game_active = False

def update_menu():
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("hello-user").innerHTML = f"<span style='font-size:24px'>{em}</span> שלום, <span style='color:var(--blue)'>{u}</span>" if u else ""
    js.document.getElementById("logged-in-ui").style.display = "block" if u else "none"
    js.document.getElementById("logged-out-ui").style.display = "none" if u else "block"

async def load_q():
    try:
        res = await pyfetch(f"{DB_URL}questions.json")
        data = await res.json()
        q_list = data['questions'] if isinstance(data, dict) and 'questions' in data else (data if isinstance(data, list) else list(data.values()))
        return [v for v in q_list if v and isinstance(v, dict) and 'q' in v]
    except: return []

async def open_lobby(e=None):
    switch_screen("lobby-screen")
    asyncio.ensure_future(refresh_rooms())

async def refresh_rooms():
    cont = js.document.getElementById("rooms-list")
    u_me = js.localStorage.getItem("user")
    res = await pyfetch(f"{DB_URL}rooms.json")
    rooms = await res.json() if res.status == 200 else None
    cont.innerHTML = ""
    if not rooms or not isinstance(rooms, dict):
        cont.innerHTML = "<p>אין חדרים זמינים כרגע.</p>"
        return
    for rid, rd in rooms.items():
        if rd.get("status") == "waiting":
            item = js.document.createElement("div")
            item.className = "room-item"
            is_mine = rd.get("player1") == u_me
            item.innerHTML = f"<span>חדר של {rd.get('player1')}</span>"
            btn = js.document.createElement("button")
            btn.innerText = "הצטרף"
            btn.className = "btn-green"
            btn.style.width = "100px"
            btn.disabled = is_mine
            if not is_mine: btn.onclick = create_proxy(lambda e, r=rid: asyncio.ensure_future(join_room(r)))
            item.appendChild(btn)
            cont.appendChild(item)

async def create_room(e=None):
    global questions, current_room_id, i_am_p1, is_pvp, game_active, score, idx
    u = js.localStorage.getItem("user")
    score, idx = 0, 0
    current_room_id, i_am_p1, is_pvp, game_active = f"room_{u}", True, True, False
    switch_screen("game-screen")
    js.document.getElementById("game-check-btn").disabled = True
    js.document.getElementById("q-text").innerHTML = "<span class='waiting'>מחכה ליריב...</span>"
    q_all = await load_q()
    questions = random.sample(q_all, 10)
    await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PUT", body=json.dumps({
        "player1": u, "player2": "", "status": "waiting", "questions": questions, "p1_score": -1, "p2_score": -1
    }))
    asyncio.ensure_future(wait_for_op())

async def join_room(rid):
    global questions, current_room_id, i_am_p1, is_pvp, game_active, score, idx
    u, score, idx = js.localStorage.getItem("user"), 0, 0
    current_room_id, i_am_p1, is_pvp, game_active = rid, False, True, True
    await pyfetch(f"{DB_URL}rooms/{rid}.json", method="PATCH", body=json.dumps({"player2": u, "status": "active"}))
    data = await (await pyfetch(f"{DB_URL}rooms/{rid}.json")).json()
    questions = data['questions']
    switch_screen("game-screen")
    js.document.getElementById("game-check-btn").disabled = False
    next_q()

async def wait_for_op():
    global game_active
    while current_room_id:
        await asyncio.sleep(2)
        try:
            res = await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")
            d = await res.json()
            if d and d.get("status") == "active":
                game_active = True
                js.document.getElementById("game-check-btn").disabled = False
                next_q(); break
        except: break

async def start_normal(e=None):
    global questions, idx, score, is_pvp, game_active
    idx, score, is_pvp, game_active = 0, 0, False, True
    switch_screen("game-screen")
    js.document.getElementById("game-score-display").innerText = "🏆 0"
    q_all = await load_q()
    questions = random.sample(q_all, 10)
    next_q()

def next_q():
    global idx, timer_val, timer_event
    if idx >= 10: asyncio.ensure_future(finish()); return
    timer_val = 15
    js.document.getElementById("q-count").innerText = f"{idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[idx]['q']
    js.document.getElementById("game-ans").value = ""
    js.document.getElementById("game-feedback").innerText = ""
    js.document.getElementById("game-ans").classList.remove("shake")
    js.document.getElementById("game-check-btn").disabled = False
    if timer_event: js.clearInterval(timer_event)
    timer_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(upd_timer())), 1000)

async def upd_timer():
    global timer_val
    if timer_val > 0:
        timer_val -= 1
        js.document.getElementById("timer").innerText = f"⏱️ {timer_val}"
    else: await check_ans()

async def check_ans(e=None):
    global idx, score, timer_event
    if timer_event: js.clearInterval(timer_event)
    js.document.getElementById("game-check-btn").disabled = True
    ans = js.document.getElementById("game-ans").value.strip().lower()
    corrects = [a.strip().lower() for a in re.split(r'[/|]', str(questions[idx]['a']))]
    fb = js.document.getElementById("game-feedback")
    
    if ans in corrects and ans != "":
        pts = 2 if timer_val > 10 else 1
        score += pts
        play_s("snd-correct")
        fb.innerHTML = f"<span style='color:var(--green)'>נכון! ✅ {'(+2 בונוס מהירות)' if pts==2 else ''}</span>"
    else:
        if score > 0: score -= 0.5
        play_s("snd-wrong")
        js.document.getElementById("game-ans").classList.add("shake")
        fb.innerHTML = f"<span style='color:var(--exit)'>טעות! התשובה: {corrects[0]} ❌</span>"
    
    js.document.getElementById("game-score-display").innerText = f"🏆 {int(score)}"
    idx += 1
    js.setTimeout(create_proxy(next_q), 1500)

async def finish():
    global game_active
    game_active = False
    if timer_event: js.clearInterval(timer_event)
    u = js.localStorage.getItem("user")
    res = await pyfetch(f"{DB_URL}users/{u}.json")
    ud = await res.json()
    new_total = (ud.get('points', 0) if ud else 0) + score
    await pyfetch(f"{DB_URL}users/{u}.json", method="PATCH", body=json.dumps({"points": new_total}))
    
    if not is_pvp:
        js.alert(f"המשחק נגמר! צברת {int(score)} נקודות.")
        update_menu(); switch_screen("menu-screen")
    else:
        switch_screen("result-screen")
        js.document.getElementById("my-final-score").innerText = f"הציון שלך: {int(score)}"
        f = "p1_score" if i_am_p1 else "p2_score"
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PATCH", body=json.dumps({f: score}))
        asyncio.ensure_future(monitor_results())

async def monitor_results():
    for _ in range(15):
        await asyncio.sleep(1)
        res = await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")
        d = await res.json()
        if d and d.get("p1_score") != -1 and d.get("p2_score") != -1:
            p1s, p2s = d["p1_score"], d["p2_score"]
            my, op = (p1s, p2s) if i_am_p1 else (p2s, p1s)
            js.document.getElementById("op-final-score").innerText = f"ציון יריב: {int(op)}"
            js.document.getElementById("result-title").innerText = "🏆 ניצחת!" if my > op else ("😞 הפסדת" if my < op else "🤝 תיקו")
            await asyncio.sleep(4)
            break
    if i_am_p1: await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="DELETE")
    update_menu(); switch_screen("menu-screen")

async def handle_quit(e=None):
    global game_active, current_room_id
    if timer_event: js.clearInterval(timer_event)
    u = js.localStorage.getItem("user")
    # שמירת נקודות שנצברו עד כה
    res = await pyfetch(f"{DB_URL}users/{u}.json")
    ud = await res.json()
    new_total = (ud.get('points', 0) if ud else 0) + score
    await pyfetch(f"{DB_URL}users/{u}.json", method="PATCH", body=json.dumps({"points": new_total}))
    
    js.alert(f"יצאת מהמשחק. נשמרו לך {int(score)} נקודות.")
    if is_pvp and current_room_id: await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="DELETE")
    current_room_id = None
    update_menu(); switch_screen("menu-screen")

async def show_scores(e=None):
    u_me = js.localStorage.getItem("user")
    switch_screen("score-screen")
    js.document.getElementById("leaderboard-content").innerHTML = "<p class='waiting'>טוען...</p>"
    res = await pyfetch(f"{DB_URL}users.json")
    users = await res.json()
    if users:
        sorted_u = sorted(users.items(), key=lambda x: x[1].get('points', 0) if isinstance(x[1], dict) else 0, reverse=True)
        h = ""
        for i, (n, d) in enumerate(sorted_u[:10]):
            is_me = (n == u_me)
            row_c = "score-row my-row" if is_me else "score-row"
            rank_c = "rank-badge rank-1" if i == 0 else "rank-badge"
            h += f"<div class='{row_c}'><div><span class='{rank_c}'>{i+1}</span>{'⭐ ' if is_me else ''}{n}</div><b>{int(d.get('points',0))}</b></div>"
        js.document.getElementById("leaderboard-content").innerHTML = h

async def open_settings(e=None):
    js.document.getElementById("set-new-name").value = js.localStorage.getItem("user")
    grid = js.document.getElementById("emoji-list")
    grid.innerHTML = ""
    for em in EMOJIS:
        d = js.document.createElement("div")
        d.className = "emoji-item"
        d.innerText = em
        d.onclick = create_proxy(lambda e, v=em: (js.localStorage.setItem("emoji", v), js.alert(f"נבחר: {v}")))
        grid.appendChild(d)
    switch_screen("settings-screen")

async def do_auth(e=None):
    u, p = js.document.getElementById("auth-u").value.strip(), js.document.getElementById("auth-p").value.strip()
    if not u: return
    hp = hashlib.sha256((p + "Trivia2026").encode()).hexdigest()
    if js.document.getElementById("auth-title").innerText == "כניסה":
        res = await pyfetch(f"{DB_URL}users/{u}.json")
        d = await res.json()
        if d and d.get("password") == hp: js.localStorage.setItem("user", u); update_menu(); switch_screen("menu-screen")
        else: js.alert("פרטים שגויים")
    else:
        await pyfetch(f"{DB_URL}users/{u}.json", method="PUT", body=json.dumps({"password": hp, "points": 0}))
        js.localStorage.setItem("user", u); update_menu(); switch_screen("menu-screen")

def run_coro(f): return create_proxy(lambda e: asyncio.ensure_future(f(e)))

js.document.getElementById("start-game-btn").onclick = run_coro(start_normal)
js.document.getElementById("start-pvp-btn").onclick = run_coro(open_lobby)
js.document.getElementById("create-room-btn").onclick = run_coro(create_room)
js.document.getElementById("game-check-btn").onclick = run_coro(check_ans)
js.document.getElementById("game-quit-btn").onclick = run_coro(handle_quit)
js.document.getElementById("view-scores-btn").onclick = run_coro(show_scores)
js.document.getElementById("auth-submit").onclick = run_coro(do_auth)
js.document.getElementById("gear-btn").onclick = run_coro(open_settings)
js.document.getElementById("save-settings-btn").onclick = create_proxy(lambda e: (js.alert("נשמר!"), update_menu(), switch_screen("menu-screen")))
js.document.getElementById("lobby-back").onclick = create_proxy(lambda e: switch_screen("menu-screen"))
js.document.getElementById("score-back").onclick = create_proxy(lambda e: switch_screen("menu-screen"))
js.document.getElementById("settings-back").onclick = create_proxy(lambda e: switch_screen("menu-screen"))
js.document.getElementById("auth-back").onclick = create_proxy(lambda e: switch_screen("menu-screen"))
js.document.getElementById("go-login-btn").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), 'innerText', 'כניסה'), switch_screen("auth-screen")))
js.document.getElementById("go-reg-btn").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), 'innerText', 'הרשמה'), switch_screen("auth-screen")))
js.document.getElementById("logout-btn").onclick = create_proxy(lambda e: (js.localStorage.clear(), update_menu(), switch_screen("menu-screen")))

update_menu()
</script>
</body>
</html>
