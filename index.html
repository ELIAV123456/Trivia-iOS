<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Quiz</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { 
            --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; 
            --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; 
            --gold: #ffd700; --silver: #c0c0c0; 
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: background 0.3s; }
        .container { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; box-sizing: border-box; position: relative; }
        .screen { display: none; flex-direction: column; max-height: 80vh; overflow-y: auto; }
        .active { display: flex; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        button:active { transform: scale(0.98); }
        .btn-green { background: var(--green); }
        .btn-blue { background: var(--blue); }
        .btn-exit { background: var(--exit); }
        .btn-purple { background: var(--purple); }
        
        /* עיצוב רשימת חדרים */
        .room-item { background: #33334d; padding: 15px; border-radius: 15px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #555; cursor: pointer; transition: 0.2s; }
        .room-item:hover { border-color: var(--blue); background: #3d3d5c; }
        .room-info { text-align: right; }
        .room-user { font-weight: bold; color: var(--blue); }

        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 10px 0; min-height: 90px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 1px solid #444; }
        .flash-green { background: #1b4d1b !important; }
        .flash-red { background: #4d1b1b !important; }
        .streak-badge { background: var(--orange); padding: 2px 10px; border-radius: 20px; font-size: 12px; margin-left: 10px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .settings-btn { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 24px; width: auto; padding: 0; cursor: pointer; }
        .emoji-opt { font-size: 30px; cursor: pointer; padding: 5px; border-radius: 10px; transition: 0.2s; }
    </style>
</head>
<body>
    <div class="container">
        <button id="settings-open" class="settings-btn">⚙️</button>

        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Quiz</h1>
            <p id="hello-user" style="color:var(--blue); font-weight:bold;"></p>
            <div id="logged-in-ui" style="display:none">
                <button class="btn-green" id="start-game-btn">משחק רגיל</button>
                <button class="btn-purple" id="go-lobby-btn">⚔️ קרב 1 על 1 (לובי)</button>
                <button style="background:var(--orange)" id="view-scores-btn">לוח תוצאות</button>
                <button class="btn-exit" id="logout-btn">התנתק</button>
            </div>
            <div id="logged-out-ui">
                <button class="btn-green" id="go-login-btn">התחברות</button>
                <button class="btn-blue" id="go-reg-btn">הרשמה</button>
            </div>
        </div>

        <div id="lobby-screen" class="screen">
            <h2>⚔️ לובי PVP</h2>
            <button class="btn-green" id="create-room-btn">➕ צור חדר חדש</button>
            <hr style="width:100%; border:0; border-top:1px solid #444; margin:10px 0;">
            <div id="rooms-list" style="min-height: 100px;">
                <p style="color:#888">מחפש חדרים פתוחים...</p>
            </div>
            <button style="background:#555" id="lobby-back">חזרה לתפריט</button>
        </div>

        <div id="settings-screen" class="screen">
            <h2>הגדרות פרופיל</h2>
            <input type="text" id="set-name" placeholder="שנה שם משתמש">
            <p>בחר אימוג'י:</p>
            <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                <span class="emoji-opt">🦁</span><span class="emoji-opt">🥷</span><span class="emoji-opt">👑</span><span class="emoji-opt">🤖</span><span class="emoji-opt">🦄</span>
            </div>
            <button class="btn-green" id="save-settings">שמור וסגור</button>
            <button style="background:#555" id="settings-back">ביטול</button>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <span id="q-count">1/10</span>
                <span><span id="streak-ui" class="streak-badge">COMBO x0</span> <span id="game-score-display">🏆 0</span></span>
                <span id="timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="game-ans" placeholder="הקלד תשובה...">
            <button class="btn-green" id="game-check-btn">שלח</button>
            <button class="btn-exit" id="game-quit-btn" style="background:#555">🚪 צא</button>
        </div>

        <div id="result-screen" class="screen">
            <h1 id="result-title">סיכום משחק</h1>
            <div class="q-card" style="flex-direction:column;">
                <div id="my-final-score">הציון שלך: 0</div>
                <div id="op-final-score" style="margin-top:10px; color:var(--orange);">ממתין ליריב...</div>
            </div>
            <button class="btn-purple" id="rematch-btn" style="display:none">🔥 קרב חוזר!</button>
            <p id="auto-return-msg" style="font-size:12px; color:#aaa;">הניקוד יישמר אוטומטית...</p>
        </div>
    </div>

    <script type="py">
import js, hashlib, random, json, re, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB_URL = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, idx, score, timer_val, timer_event = [], 0, 0, 15, None
current_room_id, is_pvp, i_am_p1, game_active = None, False, False, False
streak, selected_emoji, lobby_event = 0, "👤", None

def flash_screen(color):
    js.document.body.classList.add(f"flash-{color}")
    js.setTimeout(create_proxy(lambda: js.document.body.classList.remove(f"flash-{color}")), 400)

def switch_screen(sid):
    global game_active, lobby_event
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")
    if sid != "game-screen": game_active = False
    if sid != "lobby-screen" and lobby_event:
        js.clearInterval(lobby_event)
        lobby_event = None

def update_menu():
    u = js.localStorage.getItem("user")
    emoji = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("hello-user").innerText = f"{emoji} {u}" if u else ""
    js.document.getElementById("logged-in-ui").style.display = "block" if u else "none"
    js.document.getElementById("logged-out-ui").style.display = "none" if u else "block"

async def open_lobby(e=None):
    switch_screen("lobby-screen")
    await refresh_lobby()
    global lobby_event
    lobby_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(refresh_lobby())), 5000)

async def refresh_lobby():
    res = await pyfetch(f"{DB_URL}rooms.json")
    rooms = await res.json() if res.status == 200 else {}
    container = js.document.getElementById("rooms-list")
    container.innerHTML = ""
    now = int(js.Date.now())
    
    found = False
    if rooms and isinstance(rooms, dict):
        for rid, rd in rooms.items():
            # מחיקת חדרים ישנים מאוד
            if now - rd.get("last_pulse", 0) > 30000:
                await pyfetch(f"{DB_URL}rooms/{rid}.json", method="DELETE")
                continue
            
            if rd.get("status") == "waiting":
                found = True
                div = js.document.createElement("div")
                div.className = "room-item"
                div.innerHTML = f"<div class='room-info'><span class='room-user'>{rd.get('p1_emoji','👤')} {rd.get('player1')}</span> מחכה לקרב...</div>"
                div.onclick = create_proxy(lambda e, r=rid: asyncio.ensure_future(join_room(r)))
                container.appendChild(div)
    
    if not found:
        container.innerHTML = "<p style='color:#888; padding:20px;'>אין חדרים פתוחים כרגע.<br>תהיה הראשון שיוצר אחד!</p>"

async def create_room(e=None):
    global current_room_id, i_am_p1, questions, is_pvp
    u = js.localStorage.getItem("user")
    emoji = js.localStorage.getItem("emoji") or "👤"
    is_pvp, i_am_p1 = True, True
    current_room_id = f"room_{int(js.Date.now())}"
    
    switch_screen("game-screen")
    js.document.getElementById("q-text").innerHTML = "<span style='color:orange'>החדר נוצר! ממתין ליריב שייכנס מהלובי...</span>"
    
    q_all = await (await (await pyfetch(f"{DB_URL}questions.json")).json()).get("questions", [])
    questions = random.sample(q_all, 10)
    
    await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PUT", body=json.dumps({
        "player1": u, "p1_emoji": emoji, "status": "waiting", "questions": questions,
        "p1_score": -1, "p2_score": -1, "last_pulse": int(js.Date.now()), "rematch": 0
    }))
    asyncio.ensure_future(wait_for_op())

async def join_room(rid):
    global current_room_id, i_am_p1, questions, is_pvp, game_active
    u = js.localStorage.getItem("user")
    emoji = js.localStorage.getItem("emoji") or "👤"
    is_pvp, i_am_p1 = True, False
    current_room_id = rid
    
    await pyfetch(f"{DB_URL}rooms/{rid}.json", method="PATCH", body=json.dumps({
        "player2": u, "p2_emoji": emoji, "status": "active", "last_pulse": int(js.Date.now())
    }))
    
    d = await (await pyfetch(f"{DB_URL}rooms/{rid}.json")).json()
    questions = d['questions']
    game_active = True
    switch_screen("game-screen")
    next_q()

async def wait_for_op():
    global game_active
    while not game_active and current_room_id:
        await asyncio.sleep(2)
        d = await (await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")).json()
        if d and d.get("status") == "active":
            game_active = True
            next_q(); break
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PATCH", body=json.dumps({"last_pulse": int(js.Date.now())}))

# --- לוגיקת משחק (נשארת זהה ובטוחה) ---
def next_q():
    global idx, timer_val, timer_event
    if idx >= 10: asyncio.ensure_future(finish()); return
    timer_val = 15
    js.document.getElementById("q-count").innerText = f"{idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[idx]['q']
    js.document.getElementById("game-ans").value = ""
    if timer_event: js.clearInterval(timer_event)
    timer_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(upd_timer())), 1000)

async def upd_timer():
    global timer_val
    if timer_val > 0:
        timer_val -= 1
        js.document.getElementById("timer").innerText = f"⏱️ {timer_val}"
    else: await check_ans()

async def check_ans(e=None):
    global idx, score, streak, timer_event
    if timer_event: js.clearInterval(timer_event)
    ans = js.document.getElementById("game-ans").value.strip().lower()
    corrects = [a.strip().lower() for a in re.split(r'[/|]', str(questions[idx]['a']))]
    if ans in corrects and ans != "":
        streak += 1
        score += (1 + (2 if streak >= 3 else 0))
        flash_screen("green")
    else:
        streak = 0
        flash_screen("red")
    js.document.getElementById("game-score-display").innerText = f"🏆 {int(score)}"
    js.document.getElementById("streak-ui").style.display = "inline" if streak >= 3 else "none"
    js.document.getElementById("streak-ui").innerText = f"COMBO x{streak}"
    idx += 1
    js.setTimeout(create_proxy(next_q), 600)

async def add_pts(pts):
    u = js.localStorage.getItem("user")
    if u and pts > 0:
        ud = await (await pyfetch(f"{DB_URL}users/{u}.json")).json()
        old = ud.get('points', 0) if isinstance(ud, dict) else 0
        await pyfetch(f"{DB_URL}users/{u}.json", method="PATCH", body=json.dumps({"points": old + pts}))
        return int(pts)
    return 0

async def finish():
    global game_active
    game_active = False
    if timer_event: js.clearInterval(timer_event)
    if not is_pvp:
        added = await add_pts(score)
        js.alert(f"הסתיים! הרווחת {int(score)} נקודות.")
        switch_screen("menu-screen"); update_menu()
    else:
        switch_screen("result-screen")
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PATCH", body=json.dumps({"p1_score" if i_am_p1 else "p2_score": score, "last_pulse": int(js.Date.now())}))
        asyncio.ensure_future(monitor_pvp())

async def monitor_pvp():
    timeout = 15
    while timeout > 0:
        await asyncio.sleep(1)
        timeout -= 1
        js.document.getElementById("op-final-score").innerText = f"ממתין ליריב... ({timeout})"
        d = await (await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")).json()
        if not d: break
        p1s, p2s = d.get("p1_score"), d.get("p2_score")
        if p1s != -1 and p2s != -1:
            my_s, op_s = (p1s, p2s) if i_am_p1 else (p2s, p1s)
            js.document.getElementById("op-final-score").innerText = f"ציון יריב: {int(op_s)}"
            if my_s >= op_s: await add_pts(my_s)
            js.alert(f"המשחק נגמר! הרווחת {int(my_s if my_s >= op_s else 0)} נקודות.")
            break
    if i_am_p1: await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="DELETE")
    switch_screen("menu-screen"); update_menu()

# --- כפתורים ופרופיל ---
js.document.getElementById("go-lobby-btn").onclick = lambda e: asyncio.ensure_future(open_lobby())
js.document.getElementById("create-room-btn").onclick = lambda e: asyncio.ensure_future(create_room())
js.document.getElementById("lobby-back").onclick = lambda e: switch_screen("menu-screen")
js.document.getElementById("start-game-btn").onclick = lambda e: asyncio.ensure_future(start_normal())
js.document.getElementById("game-check-btn").onclick = lambda e: asyncio.ensure_future(check_ans())
js.document.getElementById("settings-open").onclick = lambda e: switch_screen("settings-screen")
js.document.getElementById("save-settings").onclick = lambda e: asyncio.ensure_future(save_profile())

async def save_profile(e=None):
    u_new = js.document.getElementById("set-name").value.strip()
    if u_new:
        js.localStorage.setItem("user", u_new)
        js.localStorage.setItem("emoji", selected_emoji)
    switch_screen("menu-screen"); update_menu()

def pick_emoji(e):
    global selected_emoji
    selected_emoji = e.target.innerText
    for opt in js.document.querySelectorAll(".emoji-opt"): opt.style.background = "none"
    e.target.style.background = "var(--blue)"

for em in js.document.querySelectorAll(".emoji-opt"):
    em.onclick = create_proxy(pick_emoji)

# פונקציות Auth רגילות
async def start_normal():
    global questions, idx, score, streak, is_pvp, game_active
    idx, score, streak, is_pvp, game_active = 0, 0, 0, False, True
    switch_screen("game-screen")
    q_all = await (await (await pyfetch(f"{DB_URL}questions.json")).json()).get("questions", [])
    questions = random.sample(q_all, 10)
    next_q()

update_menu()
    </script>
</body>
</html>
