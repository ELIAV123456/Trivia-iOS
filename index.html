<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Master - Ultimate Version</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #12121e; --card: #1e1e2e; --green: #4CAF50; --blue: #2196F3; --orange: #FF9800; --exit: #ff4444; --gold: #ffd700; --silver: #e0e0e0; --bronze: #cd7f32; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .container { background: var(--card); padding: 30px; border-radius: 30px; width: 95%; max-width: 450px; min-height: 580px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; border: 1px solid #333; position: relative; display: flex; flex-direction: column; }

        /* גלגלת הגדרות - נעולה פיקס לצד שמאל */
        .settings-btn { position: fixed !important; top: 20px; left: 20px; background: none; border: none; font-size: 32px; cursor: pointer; z-index: 10000; display: none; transition: transform 0.3s; }
        .settings-btn:hover { transform: rotate(90deg); }

        .screen { display: none; flex-direction: column; flex-grow: 1; justify-content: center; animation: fadeIn 0.4s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        button { width: 100%; padding: 18px; margin: 10px 0; border-radius: 15px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.6; }

        .btn-green { background: var(--green); }
        .btn-exit { background: var(--exit); }

        /* לוח תוצאות ודירוגים */
        .score-row { display: flex; justify-content: space-between; padding: 14px; border-radius: 12px; margin-bottom: 6px; background: rgba(255,255,255,0.05); align-items: center; font-size: 18px; }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent); border: 1px solid var(--gold); color: var(--gold); }
        .rank-2 { border: 1px solid var(--silver); color: var(--silver); }
        .rank-3 { border: 1px solid var(--bronze); color: var(--bronze); }
        .is-me { font-weight: bold; background: rgba(33, 150, 243, 0.1) !important; }

        .q-card { background: #252539; padding: 25px; border-radius: 20px; margin: 20px 0; font-size: 24px; font-weight: bold; border: 1px solid #444; line-height: 1.4; }
        input { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: 2px solid #444; background: #2a2a3d; color: white; text-align: center; font-size: 18px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); }

        .room-card { background: #2a2a3d; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        <button id="gear-btn" class="settings-btn">⚙️</button>

        <div id="menu-screen" class="screen active">
            <h1>🏆 Trivia Master</h1>
            <p id="welcome-text" style="font-size: 20px; margin-bottom: 20px;"></p>
            <div id="auth-section">
                <button class="btn-green" id="nav-login">כניסה למערכת</button>
                <button style="background:var(--blue)" id="nav-reg">הרשמה חדשה</button>
            </div>
            <div id="main-section" style="display:none">
                <button class="btn-green" id="start-solo">משחק יחיד</button>
                <button style="background:var(--purple)" id="nav-pvp">⚔️ קרב PVP</button>
                <button style="background:var(--orange)" id="start-scores">🏆 לוח תוצאות</button>
                <button class="btn-exit" id="act-logout">התנתק</button>
            </div>
        </div>

        <div id="lobby-screen" class="screen">
            <h2>⚔️ לובי משחקים</h2>
            <div id="rooms-list" style="max-height: 320px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="btn-green" id="act-create-room">➕ צור חדר חדש</button>
            <button style="background:#555" id="lobby-to-menu">חזרה</button>
        </div>

        <div id="score-screen" class="screen">
            <h2>🏆 טבלת האלופים</h2>
            <div id="leader-list" style="max-height: 350px; overflow-y: auto;"></div>
            <button style="background:#555; margin-top:15px;" id="score-to-menu">חזרה</button>
        </div>

        <div id="settings-screen" class="screen">
            <h2>עריכת פרופיל</h2>
            <input type="text" id="set-name" placeholder="שם משתמש חדש">
            <div id="emoji-grid" style="display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin:15px 0;"></div>
            <button class="btn-green" id="save-settings">שמור שינויים</button>
            <button style="background:#555" id="settings-to-menu">ביטול</button>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between; font-size:18px;">
                <span id="game-progress">1/10</span>
                <span id="game-timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="game-question">טוען שאלה...</div>
            <input type="text" id="game-input" placeholder="הקלד תשובה...">
            <button class="btn-green" id="game-submit">בדוק תשובה</button>
            <button class="btn-exit" id="game-exit-btn" style="background:#444">❌ צא מהמשחק</button>
        </div>

        <div id="auth-screen" class="screen">
            <h2 id="auth-label">כניסה</h2>
            <input type="text" id="u-name" placeholder="שם משתמש">
            <input type="password" id="u-pass" placeholder="סיסמה">
            <button class="btn-green" id="auth-confirm">אישור</button>
            <button style="background:#555" id="auth-to-menu">חזרה</button>
        </div>
    </div>

<script type="py">
import js, hashlib, random, json, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, cur_idx, cur_score, timer_val, t_task = [], 0, 0, 15, None
room_id, is_pvp, am_p1, game_active = None, False, False, False
selected_emoji = js.localStorage.getItem("emoji") or "👤"
EMOJIS = ["🦁","🥷","🤖","🦄","🐯","🐸","🐱","🐶","🦊","🐼","🐨","🐝","🎨","🚀","🎸","🍕","⚽","🎮","👑","🔥","💎","👻","👾","😎"]

def switch_screen(sid):
    # הגדרות (גלגלת) מוצגת רק בתפריט הראשי
    js.document.getElementById("gear-btn").style.display = "block" if sid == "menu-screen" else "none"
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")

def update_main_menu():
    user = js.localStorage.getItem("user")
    emoji = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("welcome-text").innerText = f"{emoji} ברוך הבא, {user}" if user else "אנא התחבר כדי לשחק"
    js.document.getElementById("auth-section").style.display = "none" if user else "block"
    js.document.getElementById("main-section").style.display = "block" if user else "none"
    switch_screen("menu-screen")

async def fetch_db_questions():
    try:
        res = await pyfetch(f"{DB}questions.json")
        data = await res.json()
        return data if isinstance(data, list) else list(data.values())
    except: return []

async def exit_all(e=None):
    global room_id, game_active, t_task
    if room_id and am_p1:
        await pyfetch(f"{DB}rooms/{room_id}.json", method="DELETE")
    if t_task: js.clearInterval(t_task)
    room_id, game_active = None, False
    update_main_menu()

async def load_pvp_lobby(e=None):
    switch_screen("lobby-screen")
    res = await pyfetch(f"{DB}rooms.json")
    rooms = await res.json() or {}
    container = js.document.getElementById("rooms-list")
    container.innerHTML = ""
    for r_id, r_data in rooms.items():
        if r_data.get("status") == "waiting":
            card = js.document.createElement("div")
            card.className = "room-card"
            card.innerHTML = f"<span>🎮 חדר של {r_data.get('p1')}</span>"
            btn = js.document.createElement("button")
            btn.innerText = "הצטרף"
            btn.style.width = "100px"; btn.style.margin = "0"
            btn.onclick = create_proxy(lambda e, rid=r_id: asyncio.ensure_future(join_pvp_room(rid)))
            card.appendChild(btn)
            container.appendChild(card)

async def join_pvp_room(rid):
    global room_id, am_p1, is_pvp, game_active, questions
    my_name = js.localStorage.getItem("user")
    await pyfetch(f"{DB}rooms/{rid}.json", method="PATCH", body=json.dumps({"status": "active", "p2": my_name}))
    res = await pyfetch(f"{DB}rooms/{rid}.json")
    d = await res.json()
    questions, room_id, am_p1, is_pvp, game_active = d['qs'], rid, False, True, True
    switch_screen("game-screen")
    js.document.getElementById("game-submit").disabled = False
    run_game_loop()

async def create_pvp_room(e=None):
    global room_id, am_p1, is_pvp, game_active, questions
    all_q = await fetch_db_questions()
    questions = random.sample(all_q, 10)
    room_id = f"room_{int(js.Date.now())}"
    am_p1, is_pvp, game_active = True, True, False
    my_name = js.localStorage.getItem("user")
    await pyfetch(f"{DB}rooms/{room_id}.json", method="PUT", body=json.dumps({"p1": my_name, "status": "waiting", "qs": questions}))
    switch_screen("game-screen")
    js.document.getElementById("game-question").innerText = "מחכה ליריב שיצטרף..."
    js.document.getElementById("game-submit").disabled = True
    asyncio.ensure_future(pvp_wait_loop())

async def pvp_wait_loop():
    global game_active
    while not game_active and room_id:
        await asyncio.sleep(2)
        res = await pyfetch(f"{DB}rooms/{room_id}.json")
        d = await res.json()
        if d and d.get("status") == "active":
            game_active = True
            js.document.getElementById("game-submit").disabled = False
            run_game_loop()

async def start_solo_game(e=None):
    global questions, is_pvp, game_active, cur_idx, cur_score
    cur_idx, cur_score, is_pvp, game_active = 0, 0, False, True
    all_q = await fetch_db_questions()
    questions = random.sample(all_q, 10)
    switch_screen("game-screen")
    js.document.getElementById("game-submit").disabled = False
    run_game_loop()

def run_game_loop():
    global cur_idx, cur_score
    cur_idx, cur_score = 0, 0
    next_question()

def next_question():
    global timer_val, t_task
    if cur_idx >= 10: asyncio.ensure_future(end_match_process()); return
    js.document.getElementById("game-progress").innerText = f"{cur_idx+1}/10"
    js.document.getElementById("game-question").innerText = questions[cur_idx]['q']
    js.document.getElementById("game-input").value = ""
    timer_val = 15
    if t_task: js.clearInterval(t_task)
    t_task = js.setInterval(create_proxy(lambda: asyncio.ensure_future(handle_tick())), 1000)

async def handle_tick():
    global timer_val
    timer_val -= 1
    js.document.getElementById("game-timer").innerText = f"⏱️ {timer_val}"
    if timer_val <= 0: await check_user_answer()

async def check_user_answer(e=None):
    global cur_idx, cur_score, t_task
    if t_task: js.clearInterval(t_task)
    user_val = js.document.getElementById("game-input").value.strip().lower()
    correct_val = str(questions[cur_idx]['a']).strip().lower()
    
    if user_val == correct_val and user_val != "":
        cur_score += 1
        js.document.body.style.background = "#2e7d32"
    else:
        js.document.body.style.background = "#c62828"
        
    js.setTimeout(create_proxy(lambda: setattr(js.document.body.style, 'background', '#12121e')), 500)
    cur_idx += 1
    next_question()

async def end_match_process():
    u = js.localStorage.getItem("user")
    res = await pyfetch(f"{DB}users/{u}.json")
    userData = await res.json()
    newPoints = (userData.get("points", 0) if userData else 0) + cur_score
    await pyfetch(f"{DB}users/{u}.json", method="PATCH", body=json.dumps({"points": newPoints}))
    js.alert(f"המשחק נגמר! צברת {cur_score} נקודות.")
    update_main_menu()

async def show_leaderboard_screen(e=None):
    switch_screen("score-screen")
    res = await pyfetch(f"{DB}users.json")
    all_users = await res.json() or {}
    my_name = js.localStorage.getItem("user")
    sorted_list = sorted(all_users.items(), key=lambda x: x[1].get('points', 0), reverse=True)
    
    html_content = ""
    for i, (name, data) in enumerate(sorted_list[:10]):
        rank = i + 1
        # מדליות ועיצוב RANK
        medal = "👑 " if rank == 1 else "🥈 " if rank == 2 else "🥉 " if rank == 3 else f"#{rank} "
        rank_class = f"rank-{rank}" if rank <= 3 else ""
        me_style = "is-me" if name == my_name else ""
        star = "⭐ " if name == my_name else ""
        
        html_content += f'''
        <div class="score-row {rank_class} {me_style}">
            <span>{medal}{star}{name}</span>
            <span>{data.get("points", 0)} PTS</span>
        </div>
        '''
    js.document.getElementById("leader-list").innerHTML = html_content

# ניהול הגדרות
def open_profile_settings(e=None):
    grid = js.document.getElementById("emoji-grid")
    grid.innerHTML = ""
    for em in EMOJIS:
        box = js.document.createElement("div")
        box.innerText = em
        box.style.cssText = "font-size:28px; cursor:pointer; padding:5px; border-radius:10px;"
        if em == js.localStorage.getItem("emoji"): box.style.background = "var(--blue)"
        box.onclick = create_proxy(lambda e, val=em: (js.localStorage.setItem("emoji", val), open_profile_settings()))
        grid.appendChild(box)
    switch_screen("settings-screen")

# חיווט כפתורים
js.document.getElementById("nav-login").onclick = lambda e: (setattr(js.document.getElementById("auth-label"), "innerText", "כניסה"), switch_screen("auth-screen"))
js.document.getElementById("nav-reg").onclick = lambda e: (setattr(js.document.getElementById("auth-label"), "innerText", "הרשמה"), switch_screen("auth-screen"))
js.document.getElementById("auth-to-menu").onclick = lambda e: update_main_menu()
js.document.getElementById("start-solo").onclick = create_proxy(start_solo_game)
js.document.getElementById("nav-pvp").onclick = create_proxy(load_pvp_lobby)
js.document.getElementById("act-create-room").onclick = create_proxy(create_pvp_room)
js.document.getElementById("lobby-to-menu").onclick = lambda e: update_main_menu()
js.document.getElementById("game-submit").onclick = create_proxy(check_user_answer)
js.document.getElementById("game-exit-btn").onclick = create_proxy(exit_all)
js.document.getElementById("start-scores").onclick = create_proxy(show_leaderboard_screen)
js.document.getElementById("score-to-menu").onclick = lambda e: update_main_menu()
js.document.getElementById("gear-btn").onclick = create_proxy(open_profile_settings)
js.document.getElementById("settings-to-menu").onclick = lambda e: update_main_menu()
js.document.getElementById("act-logout").onclick = lambda e: (js.localStorage.removeItem("user"), update_main_menu())

async def process_auth(e):
    u, p = js.document.getElementById("u-name").value.strip(), js.document.getElementById("u-pass").value.strip()
    if not u or not p: return
    hashed = hashlib.sha256(p.encode()).hexdigest()
    if js.document.getElementById("auth-label").innerText == "כניסה":
        res = await pyfetch(f"{DB}users/{u}.json")
        data = await res.json()
        if data and data.get("p") == hashed: js.localStorage.setItem("user", u); update_main_menu()
        else: js.alert("פרטים לא נכונים")
    else:
        await pyfetch(f"{DB}users/{u}.json", method="PUT", body=json.dumps({"p": hashed, "points": 0}))
        js.localStorage.setItem("user", u); update_main_menu()

js.document.getElementById("auth-confirm").onclick = create_proxy(process_auth)
js.document.getElementById("save-settings").onclick = lambda e: (js.localStorage.setItem("user", js.document.getElementById("set-name").value or js.localStorage.getItem("user")), update_main_menu())

update_main_menu()
</script>
</body>
</html>
