<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Quiz</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: var(--card); padding: 30px; border-radius: 25px; width: 85%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; }
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; background: #3a3a4d; color: white; text-align: center; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555 !important; opacity: 0.6; cursor: not-allowed; }
        .btn-green { background: var(--green); }
        .btn-blue { background: var(--blue); }
        .btn-exit { background: var(--exit); }
        .btn-purple { background: var(--purple); }
        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 20px 0; min-height: 60px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        
        /* עיצוב זהב לשם שלך */
        .my-row { 
            background: linear-gradient(45deg, rgba(255,215,0,0.2), rgba(255,165,0,0.3)) !important;
            border: 2px solid var(--gold) !important;
            color: var(--gold) !important;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>
    <audio id="snd-correct" src="sounds/correct.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="sounds/wrong.mp3" preload="auto"></audio>

    <div class="container">
        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Quiz </h1>
            <p id="hello-user" style="color:var(--blue); font-weight:bold;"></p>
            <div id="logged-in-ui" style="display:none">
                <button class="btn-green" id="start-game-btn">משחק רגיל</button>
                <button class="btn-purple" id="start-pvp-btn">⚔️ קרב 1 על 1</button>
                <button style="background:var(--orange)" id="view-scores-btn">לוח תוצאות</button>
                <button class="btn-exit" id="logout-btn">התנתק</button>
            </div>
            <div id="logged-out-ui">
                <button class="btn-green" id="go-login-btn">התחברות</button>
                <button class="btn-blue" id="go-reg-btn">הרשמה</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <span id="q-count">1/10</span>
                <span id="game-score-display" style="color:var(--green); font-size: 20px;">🏆 0</span>
                <span id="timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="game-ans" placeholder="המתן..." disabled>
            <button class="btn-green" id="game-check-btn" disabled>בדוק</button>
            <button class="btn-exit" id="game-quit-btn">🚪 פרוש ושמור</button>
            <p id="game-feedback" style="font-weight:bold; margin-top:10px;"></p>
        </div>

        <div id="score-screen" class="screen">
            <h1>🏆 לוח תוצאות</h1>
            <div id="leaderboard-content" style="text-align:right;"></div>
            <button class="btn-gray" id="score-back" style="background:#555">חזרה</button>
        </div>

        <div id="auth-screen" class="screen">
            <h1 id="auth-title">כניסה</h1>
            <input type="text" id="auth-u" placeholder="שם משתמש">
            <input type="password" id="auth-p" placeholder="סיסמה">
            <button class="btn-green" id="auth-submit">אישור</button>
            <button class="btn-gray" id="auth-back" style="background:#555">חזרה</button>
        </div>
    </div>

    <script type="py">
import js, hashlib, random, json, re, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB_URL = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, idx, score, timer_val, timer_event = [], 0, 0, 15, None
current_room_id, is_pvp, search_event, opponent_name = None, False, None, ""

def play_sound(id):
    try:
        el = js.document.getElementById(id)
        el.volume = 1.0
        el.currentTime = 0
        el.play()
    except: pass

def hash_p(p): return hashlib.sha256((p + "TriviaPro2026").encode()).hexdigest()

def switch_screen(sid):
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")

def update_menu():
    u = js.localStorage.getItem("user")
    if u:
        js.document.getElementById("hello-user").innerText = f"שלום, {u}"
        js.document.getElementById("logged-in-ui").style.display = "block"
        js.document.getElementById("logged-out-ui").style.display = "none"
    else:
        js.document.getElementById("hello-user").innerText = ""
        js.document.getElementById("logged-in-ui").style.display = "none"
        js.document.getElementById("logged-out-ui").style.display = "block"

async def start_game(e=None):
    global questions, idx, score, is_pvp, current_room_id
    idx, score, is_pvp, current_room_id = 0, 0, False, None
    js.document.getElementById("game-score-display").innerText = "🏆 0"
    js.document.getElementById("game-check-btn").disabled = False
    js.document.getElementById("game-ans").disabled = False
    res = await pyfetch(f"{DB_URL}questions.json")
    data = await res.json()
    questions = random.sample([v for v in data if v], 10)
    switch_screen("game-screen")
    next_q()

async def start_pvp(e=None):
    global questions, idx, score, is_pvp, current_room_id, search_event, opponent_name
    u = js.localStorage.getItem("user")
    if not u: return js.alert("התחבר קודם!")
    
    idx, score, is_pvp = 0, 0, True
    js.document.getElementById("game-score-display").innerText = "🏆 0"
    switch_screen("game-screen")
    js.document.getElementById("q-text").innerText = "מחפש יריב..."

    res = await pyfetch(f"{DB_URL}rooms.json")
    rooms = await res.json() if res.status == 200 else None
    
    target_room = None
    if rooms:
        for r_id, r_data in rooms.items():
            if r_data.get("status") == "waiting" and r_data.get("player1") != u:
                target_room = r_id; break
    
    if target_room:
        current_room_id = target_room
        await pyfetch(f"{DB_URL}rooms/{target_room}.json", method="PATCH", body=json.dumps({"player2": u, "status": "active"}))
        room_data = await (await pyfetch(f"{DB_URL}rooms/{target_room}.json")).json()
        opponent_name = room_data.get("player1")
        questions = room_data['questions']
        js.document.getElementById("q-text").innerText = f"נמצא יריב: {opponent_name}\nמתחילים..."
        js.setTimeout(create_proxy(lambda: start_pvp_now()), 3000)
    else:
        current_room_id = f"room_{int(js.Date.now())}"
        q_res = await pyfetch(f"{DB_URL}questions.json")
        all_q = await q_res.json()
        questions = random.sample([v for v in all_q if v], 10)
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PUT", body=json.dumps({
            "player1": u, "player2": "", "status": "waiting", "questions": questions
        }))
        search_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(check_room_status())), 2000)

async def check_room_status():
    global search_event, opponent_name
    if not current_room_id: return
    res = await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")
    data = await res.json()
    if data and data.get("status") == "active":
        js.clearInterval(search_event)
        search_event = None
        opponent_name = data.get("player2")
        js.document.getElementById("q-text").innerText = f"יריב התחבר: {opponent_name}\nמתחילים..."
        js.setTimeout(create_proxy(lambda: start_pvp_now()), 3000)

def start_pvp_now():
    js.document.getElementById("game-check-btn").disabled = False
    js.document.getElementById("game-ans").disabled = False
    next_q()

def next_q():
    global idx, timer_val, timer_event
    if idx >= 10:
        asyncio.ensure_future(save_and_exit())
        return
    timer_val = 15
    js.document.getElementById("q-count").innerText = f"{idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[idx]['q']
    js.document.getElementById("game-ans").value = ""
    js.document.getElementById("game-feedback").innerText = ""
    js.document.getElementById("game-check-btn").disabled = False
    if timer_event: js.clearInterval(timer_event)
    timer_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(update_timer())), 1000)

async def update_timer():
    global timer_val
    if timer_val > 0:
        timer_val -= 1
        js.document.getElementById("timer").innerText = f"⏱️ {timer_val}"
    else:
        await check_ans()

async def check_ans(e=None):
    global idx, score, timer_event
    if timer_event: js.clearInterval(timer_event)
    js.document.getElementById("game-check-btn").disabled = True
    u_ans = js.document.getElementById("game-ans").value.strip().lower()
    c_list = [a.strip().lower() for a in re.split(r'[/|]', str(questions[idx]['a']))]
    
    if u_ans in c_list and u_ans != "":
        score += 1
        play_sound("snd-correct")
        js.document.getElementById("game-feedback").innerText = "✅ נכון!"
    else:
        if score > 0: score -= 1
        play_sound("snd-wrong")
        js.document.getElementById("game-feedback").innerText = f"❌ טעות: {c_list[0]}"
    
    js.document.getElementById("game-score-display").innerText = f"🏆 {int(score)}"
    idx += 1
    js.setTimeout(create_proxy(next_q), 1200)

async def save_and_exit(e=None, is_forced=False):
    global score, timer_event, current_room_id, search_event
    if timer_event: js.clearInterval(timer_event)
    if search_event: js.clearInterval(search_event)
    
    u = js.localStorage.getItem("user")
    if u and score > 0:
        res = await pyfetch(f"{DB_URL}users/{u}.json")
        udata = await res.json()
        old = udata.get('points', 0) if udata and isinstance(udata, dict) else 0
        await pyfetch(f"{DB_URL}users/{u}.json", method="PATCH", body=json.dumps({"points": old + score}))
    
    if current_room_id:
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="DELETE")
        current_room_id = None
        
    if not is_forced: js.alert(f"המשחק נגמר. צברת {int(score)} נקודות.")
    switch_screen("menu-screen")
    update_menu()

async def show_scores(e=None):
    u_me = js.localStorage.getItem("user")
    switch_screen("score-screen")
    res = await pyfetch(f"{DB_URL}users.json")
    users = await res.json()
    if users:
        sorted_u = sorted(users.items(), key=lambda x: x[1].get('points', 0) if isinstance(x[1], dict) else 0, reverse=True)
        h = ""
        for n, d in sorted_u[:10]:
            is_me = (n == u_me)
            row_class = "class='my-row'" if is_me else ""
            h += f"<div {row_class} style='padding:12px; border-bottom:1px solid #444; display:flex; justify-content:space-between;'>"
            h += f"<span>{'⭐ ' if is_me else ''}{n}</span><span>{int(d.get('points',0))}</span></div>"
        js.document.getElementById("leaderboard-content").innerHTML = h

# סגירת חדר ביציאה מהאתר
def cleanup(e):
    if current_room_id:
        js.fetch(f"{DB_URL}rooms/{current_room_id}.json", {"method": "DELETE", "keepalive": True})

js.window.onbeforeunload = create_proxy(cleanup)

def run_async(func):
    def wrapper(e): asyncio.ensure_future(func(e))
    return create_proxy(wrapper)

# אירועים
js.document.getElementById("go-login-btn").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), 'innerText', 'כניסה'), switch_screen("auth-screen")))
js.document.getElementById("go-reg-btn").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), 'innerText', 'הרשמה'), switch_screen("auth-screen")))
js.document.getElementById("auth-submit").onclick = run_async(lambda e: do_auth()) # פונקציית Auth חסרה בקוד הקודם, הוסף אותה אם צריך
js.document.getElementById("start-game-btn").onclick = run_async(start_game)
js.document.getElementById("start-pvp-btn").onclick = run_async(start_pvp)
js.document.getElementById("game-check-btn").onclick = run_async(check_ans)
js.document.getElementById("game-quit-btn").onclick = run_async(save_and_exit)
js.document.getElementById("view-scores-btn").onclick = run_async(show_scores)
js.document.getElementById("score-back").onclick = create_proxy(lambda e: switch_screen("menu-screen"))

update_menu()
    </script>
</body>
</html>
