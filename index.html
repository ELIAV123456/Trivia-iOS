<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Quiz</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: var(--card); padding: 30px; border-radius: 25px; width: 85%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; }
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; background: #3a3a4d; color: white; text-align: center; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #555 !important; opacity: 0.6; cursor: not-allowed; }
        .btn-green { background: var(--green); }
        .btn-blue { background: var(--blue); }
        .btn-exit { background: var(--exit); }
        .btn-purple { background: var(--purple); }
        .q-card { background: #33334d; padding: 25px; border-radius: 15px; margin: 15px 0; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 1px solid #444; }
        .my-row { background: linear-gradient(45deg, rgba(255,215,0,0.1), rgba(255,215,0,0.2) ) !important; border: 2px solid var(--gold) !important; color: var(--gold) !important; font-weight: bold; border-radius: 12px; }
        #status-msg { font-size: 14px; color: var(--orange); margin-top: 10px; }
    </style>
</head>
<body>
    <audio id="snd-correct" src="sounds/correct.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="sounds/wrong.mp3" preload="auto"></audio>

    <div class="container">
        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Quiz </h1>
            <p id="hello-user" style="color:var(--blue); font-weight:bold;"></p>
            <div id="logged-in-ui" style="display:none">
                <button class="btn-green" id="start-game-btn">משחק רגיל</button>
                <button class="btn-purple" id="start-pvp-btn">⚔️ קרב 1 על 1</button>
                <button style="background:var(--orange)" id="view-scores-btn">לוח תוצאות</button>
                <button class="btn-exit" id="logout-btn">התנתק</button>
            </div>
            <div id="logged-out-ui">
                <button class="btn-green" id="go-login-btn">התחברות</button>
                <button class="btn-blue" id="go-reg-btn">הרשמה</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <span id="q-count">1/10</span>
                <span id="game-score-display" style="color:var(--green); font-size: 20px;">🏆 0</span>
                <span id="timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="game-ans" placeholder="תשובה..." autocomplete="off">
            <button class="btn-green" id="game-check-btn">בדוק</button>
            <button class="btn-exit" id="game-quit-btn" style="font-size:14px; background:#666;">🚪 פרוש ושמור נקודות</button>
            <p id="game-feedback"></p>
        </div>

        <div id="result-screen" class="screen">
            <h1 id="result-title">המשחק הסתיים!</h1>
            <div class="q-card">
                <div id="my-final-score">הציון שלך: 0</div>
                <div id="op-final-score" style="color:var(--orange)">היריב מחשב תוצאה...</div>
            </div>
            <p id="pvp-status-msg">ממתין לסנכרון (עד 60 שניות)...</p>
            <button class="btn-blue" id="back-to-menu-btn" style="display:none">חזרה לתפריט</button>
        </div>

        <div id="score-screen" class="screen">
            <h1>🏆 לוח תוצאות</h1>
            <div id="leaderboard-content" style="max-height: 300px; overflow-y: auto; text-align:right;"></div>
            <button style="background:#555" id="score-back">חזרה</button>
        </div>

        <div id="auth-screen" class="screen">
            <h1 id="auth-title">כניסה</h1>
            <input type="text" id="auth-u" placeholder="שם משתמש">
            <input type="password" id="auth-p" placeholder="סיסמה">
            <button class="btn-green" id="auth-submit">אישור</button>
            <button style="background:#555" id="auth-back">חזרה</button>
        </div>
    </div>

    <script type="py">
import js, hashlib, random, json, re, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB_URL = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, idx, score, timer_val, timer_event = [], 0, 0, 15, None
current_room_id, is_pvp, i_am_p1, game_active = None, False, False, False

def play_sound(sid):
    if not game_active: return
    try:
        s = js.document.getElementById(sid); s.currentTime = 0; s.play()
    except: pass

def switch_screen(sid):
    global game_active
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")
    if sid != "game-screen": game_active = False

def update_menu():
    u = js.localStorage.getItem("user")
    if u:
        js.document.getElementById("hello-user").innerText = f"שלום, {u}"
        js.document.getElementById("logged-in-ui").style.display = "block"
        js.document.getElementById("logged-out-ui").style.display = "none"
    else:
        js.document.getElementById("hello-user").innerText = ""
        js.document.getElementById("logged-in-ui").style.display = "none"
        js.document.getElementById("logged-out-ui").style.display = "block"

async def start_game(e=None):
    global questions, idx, score, is_pvp, game_active
    idx, score, is_pvp, game_active = 0, 0, False, True
    js.document.getElementById("game-score-display").innerText = "🏆 0"
    js.document.getElementById("game-check-btn").disabled = False
    try:
        res = await pyfetch(f"{DB_URL}questions.json")
        data = await res.json()
        questions = random.sample([v for v in data if v], 10)
        switch_screen("game-screen")
        next_q()
    except: js.alert("שגיאה בטעינת שאלות")

async def start_pvp(e=None):
    global questions, idx, score, is_pvp, current_room_id, i_am_p1, game_active
    u = js.localStorage.getItem("user")
    if not u: return js.alert("התחבר קודם!")
    
    idx, score, is_pvp, game_active = 0, 0, True, False
    switch_screen("game-screen")
    js.document.getElementById("q-text").innerText = "מחפש יריב..."
    js.document.getElementById("game-check-btn").disabled = True
    
    r_res = await pyfetch(f"{DB_URL}rooms.json")
    rooms = await r_res.json() if r_res.status == 200 else None
    
    now = int(js.Date.now())
    target = None
    
    if rooms and isinstance(rooms, dict):
        for rid, rdata in list(rooms.items()):
            # ניקוי חדרים נטושים (יותר מ-5 דקות)
            room_ts = int(rid.split('_')[1]) if '_' in rid else 0
            if rdata.get("status") == "waiting" and (now - room_ts > 300000):
                await pyfetch(f"{DB_URL}rooms/{rid}.json", method="DELETE")
                continue
            # מציאת חדר מחכה
            if rdata.get("status") == "waiting" and rdata.get("player1") != u:
                target = rid; break
    
    if target:
        i_am_p1 = False; current_room_id = target
        await pyfetch(f"{DB_URL}rooms/{target}.json", method="PATCH", body=json.dumps({"player2": u, "status": "active"}))
        data = await (await pyfetch(f"{DB_URL}rooms/{target}.json")).json()
        questions = data['questions']
        game_active = True
        js.document.getElementById("game-check-btn").disabled = False
        next_q()
    else:
        i_am_p1 = True; current_room_id = f"room_{now}"
        q_res = await pyfetch(f"{DB_URL}questions.json")
        q_list = await q_res.json()
        questions = random.sample([v for v in q_list if v], 10)
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PUT", body=json.dumps({
            "player1": u, "player2": "", "status": "waiting", "questions": questions, "p1_score": -1, "p2_score": -1
        }))
        asyncio.ensure_future(wait_for_opponent())

async def wait_for_opponent():
    global game_active
    while not game_active:
        await asyncio.sleep(2)
        try:
            res = await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")
            data = await res.json()
            if data and data.get("status") == "active":
                game_active = True
                js.document.getElementById("game-check-btn").disabled = False
                next_q()
                break
        except: pass

def next_q():
    global idx, timer_val, timer_event
    if not game_active: return
    if idx >= 10:
        asyncio.ensure_future(finish_game())
        return
    timer_val = 15
    js.document.getElementById("q-count").innerText = f"{idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[idx]['q']
    js.document.getElementById("game-ans").value = ""
    js.document.getElementById("game-feedback").innerText = ""
    js.document.getElementById("game-check-btn").disabled = False
    if timer_event: js.clearInterval(timer_event)
    timer_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(update_timer())), 1000)

async def update_timer():
    global timer_val
    if timer_val > 0:
        timer_val -= 1
        js.document.getElementById("timer").innerText = f"⏱️ {timer_val}"
    else: await check_ans()

async def check_ans(e=None):
    global idx, score, timer_event
    if timer_event: js.clearInterval(timer_event)
    js.document.getElementById("game-check-btn").disabled = True
    ans = js.document.getElementById("game-ans").value.strip().lower()
    corrects = [a.strip().lower() for a in re.split(r'[/|]', str(questions[idx]['a']))]
    
    if ans in corrects and ans != "":
        score += 1
        play_sound("snd-correct")
        js.document.getElementById("game-feedback").innerHTML = "<span style='color:var(--green)'>נכון!</span>"
    else:
        if score > 0: score -= 0.5
        play_sound("snd-wrong")
        js.document.getElementById("game-feedback").innerHTML = f"<span style='color:var(--exit)'>טעות: {corrects[0]}</span>"
    
    js.document.getElementById("game-score-display").innerText = f"🏆 {int(score)}"
    idx += 1
    js.setTimeout(create_proxy(next_q), 1000)

async def quit_and_save(e=None):
    global game_active
    if not game_active: return
    if js.confirm("בטוח שברצונך לפרוש ולשמור את הנקודות?"):
        game_active = False
        await add_pts(score)
        if is_pvp and current_room_id:
            field = "p1_score" if i_am_p1 else "p2_score"
            await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PATCH", body=json.dumps({field: score}))
        switch_screen("menu-screen")
        update_menu()

async def finish_game():
    global game_active
    game_active = False
    if timer_event: js.clearInterval(timer_event)
    if not is_pvp:
        await add_pts(score)
        js.alert(f"המשחק הסתיים! צברת {int(score)} נקודות.")
        switch_screen("menu-screen")
        update_menu()
    else:
        switch_screen("result-screen")
        js.document.getElementById("my-final-score").innerText = f"הציון שלך: {int(score)}"
        field = "p1_score" if i_am_p1 else "p2_score"
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PATCH", body=json.dumps({field: score}))
        asyncio.ensure_future(monitor_results())

async def monitor_results():
    start_time = js.Date.now()
    while True:
        await asyncio.sleep(2)
        # טיימר ביטחון 60 שניות
        if js.Date.now() - start_time > 60000:
            js.alert("היריב לא זמין. חוזר לתפריט עם הנקודות שלך.")
            await add_pts(score)
            switch_screen("menu-screen"); break
            
        try:
            res = await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")
            data = await res.json()
            if not data:
                js.alert("החדר נסגר.")
                switch_screen("menu-screen"); break
            
            p1s, p2s = data.get("p1_score"), data.get("p2_score")
            if p1s != -1 and p2s != -1:
                my_s, op_s = (p1s, p2s) if i_am_p1 else (p2s, p1s)
                js.document.getElementById("op-final-score").innerText = f"ציון היריב: {int(op_s)}"
                js.document.getElementById("back-to-menu-btn").style.display = "block"
                js.document.getElementById("pvp-status-msg").innerText = "התוצאות התקבלו!"
                
                if my_s > op_s:
                    js.document.getElementById("result-title").innerText = "🏆 ניצחת!"
                    await add_pts(my_s)
                elif my_s < op_s:
                    js.document.getElementById("result-title").innerText = "😞 הפסדת..."
                else:
                    js.document.getElementById("result-title").innerText = "🤝 תיקו!"
                    await add_pts(my_s)
                
                if i_am_p1: await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="DELETE")
                break
        except: break

async def add_pts(pts):
    u = js.localStorage.getItem("user")
    if u and pts > 0:
        try:
            res = await pyfetch(f"{DB_URL}users/{u}.json")
            udata = await res.json()
            old = udata.get('points', 0) if isinstance(udata, dict) else 0
            await pyfetch(f"{DB_URL}users/{u}.json", method="PATCH", body=json.dumps({"points": old + pts}))
        except: pass

async def show_scores(e=None):
    u_me = js.localStorage.getItem("user")
    switch_screen("score-screen")
    js.document.getElementById("leaderboard-content").innerHTML = "טוען..."
    try:
        res = await pyfetch(f"{DB_URL}users.json")
        users = await res.json()
        if users:
            sorted_u = sorted(users.items(), key=lambda x: x[1].get('points', 0) if isinstance(x[1], dict) else 0, reverse=True)
            h = ""
            for n, d in sorted_u[:10]:
                is_me = (n == u_me)
                row_class = "class='my-row'" if is_me else ""
                h += f"<div {row_class} style='padding:12px; border-bottom:1px solid #444; display:flex; justify-content:space-between;'>"
                h += f"<span>{'⭐ ' if is_me else ''}{n}</span><span>{int(d.get('points',0))}</span></div>"
            js.document.getElementById("leaderboard-content").innerHTML = h
    except: js.document.getElementById("leaderboard-content").innerHTML = "שגיאה בטעינה"

async def do_auth(e=None):
    mode = js.document.getElementById("auth-title").innerText
    u, p = js.document.getElementById("auth-u").value.strip(), js.document.getElementById("auth-p").value.strip()
    if not u or not p: return
    try:
        h_p = hashlib.sha256((p + "TriviaPro2026").encode()).hexdigest()
        res = await pyfetch(f"{DB_URL}users/{u}.json")
        data = await res.json()
        if mode == "כניסה":
            if data and data.get("password") == h_p:
                js.localStorage.setItem("user", u); update_menu(); switch_screen("menu-screen")
            else: js.alert("פרטים שגויים")
        else:
            await pyfetch(f"{DB_URL}users/{u}.json", method="PUT", body=json.dumps({"password": h_p, "points": 0}))
            js.localStorage.setItem("user", u); update_menu(); switch_screen("menu-screen")
    except: js.alert("תקלה בחיבור")

def run_async(func):
    def wrapper(e): asyncio.ensure_future(func(e))
    return create_proxy(wrapper)

js.document.getElementById("start-game-btn").onclick = run_async(start_game)
js.document.getElementById("start-pvp-btn").onclick = run_async(start_pvp)
js.document.getElementById("game-check-btn").onclick = run_async(check_ans)
js.document.getElementById("game-quit-btn").onclick = run_async(quit_and_save)
js.document.getElementById("back-to-menu-btn").onclick = create_proxy(lambda e: switch_screen("menu-screen"))
js.document.getElementById("view-scores-btn").onclick = run_async(show_scores)
js.document.getElementById("score-back").onclick = create_proxy(lambda e: switch_screen("menu-screen"))
js.document.getElementById("go-login-btn").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), 'innerText', 'כניסה'), switch_screen("auth-screen")))
js.document.getElementById("go-reg-btn").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), 'innerText', 'הרשמה'), switch_screen("auth-screen")))
js.document.getElementById("auth-submit").onclick = run_async(do_auth)
js.document.getElementById("auth-back").onclick = create_proxy(lambda e: switch_screen("menu-screen"))
js.document.getElementById("logout-btn").onclick = create_proxy(lambda e: (js.localStorage.removeItem("user"), update_menu()))

update_menu()
    </script>
</body>
</html>
