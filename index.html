<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Master Ultimate</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; min-height: 550px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; position: relative; display: flex; flex-direction: column; }

        /* גלגלת בצד שמאל רק בתפריט */
        .settings-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; font-size: 28px; cursor: pointer; z-index: 1000; display: none; }

        .screen { display: none; flex-direction: column; flex-grow: 1; justify-content: center; }
        .active { display: flex; }

        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-exit { background: var(--exit); }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 18px; box-sizing: border-box; }
        
        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 15px 0; font-size: 22px; font-weight: bold; border: 1px solid #444; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        
        /* לוח תוצאות V2 */
        .score-row { display: flex; justify-content: space-between; padding: 12px; border-radius: 8px; margin-bottom: 4px; background: rgba(255,255,255,0.05); align-items: center; }
        .rank-1 { border: 2px solid var(--gold); }
        .rank-2 { border: 2px solid var(--silver); }
        .rank-3 { border: 2px solid var(--bronze); }
    </style>
</head>
<body>
    <div class="container">
        <button id="gear-btn" class="settings-btn">⚙️</button>

        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Master</h1>
            <p id="user-display" style="color:var(--blue); font-weight:bold;"></p>
            <div id="auth-btns">
                <button class="btn-green" id="go-login">כניסה</button>
                <button style="background:var(--blue)" id="go-reg">הרשמה</button>
            </div>
            <div id="game-btns" style="display:none">
                <button class="btn-green" id="play-solo">משחק יחיד</button>
                <button class="btn-purple" id="play-pvp">⚔️ קרב PVP</button>
                <button style="background:var(--orange)" id="show-scores">🏆 לוח תוצאות</button>
                <button class="btn-exit" id="do-logout">התנתק</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between;"><span id="q-count">1/10</span><span id="q-timer" style="color:var(--orange)">⏱️ 15</span></div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="ans-input" placeholder="הקלד תשובה...">
            <button class="btn-green" id="submit-ans">שלח תשובה</button>
            <button id="exit-game" class="btn-exit" style="background:#444">❌ יציאה</button>
        </div>

        <div id="score-screen" class="screen">
            <h2>🏆 טבלת אלופים</h2>
            <div id="leaderboard-cont"></div>
            <button style="background:#555" id="score-back">חזרה</button>
        </div>

        <div id="settings-screen" class="screen">
            <h2>הגדרות</h2>
            <input type="text" id="new-username" placeholder="שם חדש">
            <div id="emoji-picker" style="display:grid; grid-template-columns: repeat(5,1fr); gap:5px;"></div>
            <button class="btn-green" id="save-profile">שמור</button>
            <button style="background:#555" id="settings-back">ביטול</button>
        </div>

        <div id="auth-screen" class="screen">
            <h2 id="auth-title">כניסה</h2>
            <input type="text" id="auth-user" placeholder="שם משתמש">
            <input type="password" id="auth-pass" placeholder="סיסמה">
            <button class="btn-green" id="auth-submit">אישור</button>
            <button style="background:#555" id="auth-back">חזרה</button>
        </div>

        <div id="lobby-screen" class="screen">
            <h2>⚔️ לובי PVP</h2>
            <div id="lobby-list"></div>
            <button class="btn-purple" id="create-room">צור חדר</button>
            <button style="background:#555" id="lobby-back">חזרה</button>
        </div>
    </div>

<script type="py">
import js, hashlib, random, json, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, cur_idx, cur_score, timer_val, t_task = [], 0, 0, 15, None
EMOJIS = ["🦁","🥷","🤖","🦄","🐯","🐸","🐱","🐶","🦊","🐼"]

def switch(sid):
    # גלגלת מופיעה רק בתפריט
    js.document.getElementById("gear-btn").style.display = "block" if sid == "menu-screen" else "none"
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")

def update_ui(e=None):
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("user-display").innerText = f"{em} שלום {u}" if u else ""
    js.document.getElementById("auth-btns").style.display = "none" if u else "block"
    js.document.getElementById("game-btns").style.display = "block" if u else "none"
    switch("menu-screen")

async def get_all_q():
    res = await pyfetch(f"{DB}questions.json")
    d = await res.json()
    return d if isinstance(d, list) else list(d.values())

async def start_solo(e=None):
    global questions, cur_idx, cur_score
    all_q = await get_all_q()
    questions = random.sample(all_q, 10)
    cur_idx, cur_score = 0, 0
    switch("game-screen")
    load_question()

def load_question():
    global timer_val, t_task
    if cur_idx >= 10: asyncio.ensure_future(end_game()); return
    js.document.getElementById("q-count").innerText = f"{cur_idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[cur_idx]['q']
    js.document.getElementById("ans-input").value = ""
    timer_val = 15
    if t_task: js.clearInterval(t_task)
    t_task = js.setInterval(create_proxy(lambda: asyncio.ensure_future(tick())), 1000)

async def tick():
    global timer_val
    timer_val -= 1
    js.document.getElementById("q-timer").innerText = f"⏱️ {timer_val}"
    if timer_val <= 0: await check_user_answer()

async def check_user_answer(e=None):
    global cur_idx, cur_score, t_task
    if t_task: js.clearInterval(t_task)
    
    # תיקון תשובות סופי: ניקוי מחרוזת מוחלט
    u_ans = str(js.document.getElementById("ans-input").value).strip().lower()
    c_ans = str(questions[cur_idx]['a']).strip().lower()
    
    if u_ans == c_ans and u_ans != "":
        cur_score += 1
        js.document.body.style.background = "#2e7d32" # ירוק
    else:
        js.document.body.style.background = "#c62828" # אדום
        
    js.setTimeout(create_proxy(lambda: setattr(js.document.body.style, 'background', '#1e1e2e')), 500)
    cur_idx += 1
    load_question()

async def end_game():
    u = js.localStorage.getItem("user")
    res = await pyfetch(f"{DB}users/{u}.json")
    d = await res.json()
    new_p = (d.get("points", 0) if d else 0) + cur_score
    await pyfetch(f"{DB}users/{u}.json", method="PATCH", body=json.dumps({"points": new_p}))
    js.alert(f"המשחק נגמר! קיבלת {cur_score} נקודות מתוך 10.")
    update_ui()

async def show_leaderboard(e=None):
    switch("score-screen")
    res = await pyfetch(f"{DB}users.json")
    users = await res.json() or {}
    sorted_u = sorted(users.items(), key=lambda x: x[1].get('points', 0), reverse=True)
    h = ""
    for i, (name, data) in enumerate(sorted_u[:10]):
        rank = i + 1
        r_class = f"rank-{rank}" if rank <= 3 else ""
        h += f'<div class="score-row {r_class}"><span>#{rank} {name}</span><span>{data.get("points",0)} PTS</span></div>'
    js.document.getElementById("leaderboard-cont").innerHTML = h

# הגדרות ואימות
async def auth_handler(e):
    u, p = js.document.getElementById("auth-user").value.strip(), js.document.getElementById("auth-pass").value.strip()
    if not u or not p: return
    hp = hashlib.sha256(p.encode()).hexdigest()
    if js.document.getElementById("auth-title").innerText == "כניסה":
        res = await pyfetch(f"{DB}users/{u}.json")
        d = await res.json()
        if d and d.get("p") == hp: js.localStorage.setItem("user", u); update_ui()
        else: js.alert("טעות")
    else:
        await pyfetch(f"{DB}users/{u}.json", method="PUT", body=json.dumps({"p": hp, "points": 0}))
        js.localStorage.setItem("user", u); update_ui()

def open_settings(e=None):
    grid = js.document.getElementById("emoji-picker")
    grid.innerHTML = ""
    for em in EMOJIS:
        span = js.document.createElement("span")
        span.innerText = em; span.style.cursor="pointer"; span.style.fontSize="26px"
        span.onclick = create_proxy(lambda e, v=em: (js.localStorage.setItem("emoji", v), open_settings()))
        grid.appendChild(span)
    switch("settings-screen")

# חיווט כפתורים
js.document.getElementById("go-login").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), "innerText", "כניסה"), switch("auth-screen")))
js.document.getElementById("go-reg").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), "innerText", "הרשמה"), switch("auth-screen")))
js.document.getElementById("play-solo").onclick = create_proxy(start_solo)
js.document.getElementById("submit-ans").onclick = create_proxy(check_user_answer)
js.document.getElementById("exit-game").onclick = create_proxy(lambda e: update_ui())
js.document.getElementById("show-scores").onclick = create_proxy(show_leaderboard)
js.document.getElementById("score-back").onclick = create_proxy(update_ui)
js.document.getElementById("gear-btn").onclick = create_proxy(open_settings)
js.document.getElementById("settings-back").onclick = create_proxy(update_ui)
js.document.getElementById("auth-submit").onclick = create_proxy(auth_handler)
js.document.getElementById("auth-back").onclick = create_proxy(update_ui)
js.document.getElementById("do-logout").onclick = create_proxy(lambda e: (js.localStorage.removeItem("user"), update_ui()))
js.document.getElementById("save-profile").onclick = create_proxy(lambda e: (js.localStorage.setItem("user", js.document.getElementById("new-username").value or js.localStorage.getItem("user")), update_ui()))

update_ui()
</script>
</body>
</html>
