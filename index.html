<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Master Fixed</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; min-height: 550px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; position: relative; display: flex; flex-direction: column; }
        .settings-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; font-size: 28px; cursor: pointer; z-index: 1000; display: none; }
        .screen { display: none; flex-direction: column; flex-grow: 1; justify-content: center; }
        .active { display: flex; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-exit { background: var(--exit); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 18px; box-sizing: border-box; }
        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 15px 0; font-size: 22px; font-weight: bold; border: 1px solid #444; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .score-row { display: flex; justify-content: space-between; padding: 12px; border-radius: 8px; margin-bottom: 4px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <button id="gear-btn" class="settings-btn">⚙️</button>
        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Master</h1>
            <p id="user-display" style="color:var(--blue); font-weight:bold;"></p>
            <div id="auth-btns">
                <button class="btn-green" id="go-login">כניסה</button>
                <button style="background:var(--blue)" id="go-reg">הרשמה</button>
            </div>
            <div id="game-btns" style="display:none">
                <button class="btn-green" id="play-solo">משחק יחיד</button>
                <button class="btn-purple" id="play-pvp">⚔️ קרב PVP</button>
                <button style="background:var(--orange)" id="show-scores">🏆 לוח תוצאות</button>
                <button class="btn-exit" id="do-logout">התנתק</button>
            </div>
        </div>
        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between;"><span id="q-count">1/10</span><span id="q-timer" style="color:var(--orange)">⏱️ 15</span></div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="ans-input" placeholder="הקלד תשובה כאן...">
            <button class="btn-green" id="submit-ans">שלח תשובה</button>
            <button id="exit-game" class="btn-exit" style="background:#444">❌ יציאה</button>
        </div>
        <div id="score-screen" class="screen"><h2>🏆 טבלת אלופים</h2><div id="leaderboard-cont"></div><button style="background:#555" id="score-back">חזרה</button></div>
        <div id="auth-screen" class="screen"><h2 id="auth-title">כניסה</h2><input type="text" id="auth-user" placeholder="שם משתמש"><input type="password" id="auth-pass" placeholder="סיסמה"><button class="btn-green" id="auth-submit">אישור</button><button style="background:#555" id="auth-back">חזרה</button></div>
    </div>

<script type="py">
import js, hashlib, random, json, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, cur_idx, cur_score, timer_val, t_task = [], 0, 0, 15, None
game_active = False

def switch(sid):
    js.document.getElementById("gear-btn").style.display = "block" if sid == "menu-screen" else "none"
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")

def update_ui():
    u = js.localStorage.getItem("user")
    js.document.getElementById("user-display").innerText = f"שלום {u}" if u else ""
    js.document.getElementById("auth-btns").style.display = "none" if u else "block"
    js.document.getElementById("game-btns").style.display = "block" if u else "none"
    switch("menu-screen")

async def start_solo(e=None):
    global questions, cur_idx, cur_score, game_active
    res = await pyfetch(f"{DB}questions.json")
    d = await res.json()
    all_q = d if isinstance(d, list) else list(d.values())
    questions = random.sample(all_q, 10)
    cur_idx, cur_score, game_active = 0, 0, True
    switch("game-screen")
    load_question()

def load_question():
    global timer_val, t_task
    if cur_idx >= 10: asyncio.ensure_future(end_game()); return
    js.document.getElementById("q-count").innerText = f"{cur_idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[cur_idx]['q']
    js.document.getElementById("ans-input").value = ""
    timer_val = 15
    if t_task: js.clearInterval(t_task)
    t_task = js.setInterval(create_proxy(lambda: asyncio.ensure_future(tick())), 1000)

async def tick():
    global timer_val
    timer_val -= 1
    js.document.getElementById("q-timer").innerText = f"⏱️ {timer_val}"
    if timer_val <= 0: await check_user_answer()

async def check_user_answer(e=None):
    global cur_idx, cur_score, t_task
    if t_task: js.clearInterval(t_task)
    
    # התיקון שביקשת: הפרדת רווחים ואותיות קטנות/גדולות
    u_ans = js.document.getElementById("ans-input").value.strip().lower()
    c_ans = str(questions[cur_idx]['a']).strip().lower()
    
    if u_ans == c_ans and u_ans != "":
        cur_score += 1
        js.document.body.style.background = "#2e7d32" # ירוק
    else:
        js.document.body.style.background = "#c62828" # אדום
        
    js.setTimeout(create_proxy(lambda: setattr(js.document.body.style, 'background', '#1e1e2e')), 500)
    cur_idx += 1
    load_question()

async def end_game():
    js.alert(f"סיימת! {cur_score} מתוך 10")
    update_ui()

# חיבור מחדש של כל הכפתורים בצורה בטוחה
js.document.getElementById("go-login").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), "innerText", "כניסה"), switch("auth-screen")))
js.document.getElementById("go-reg").onclick = create_proxy(lambda e: (setattr(js.document.getElementById("auth-title"), "innerText", "הרשמה"), switch("auth-screen")))
js.document.getElementById("play-solo").onclick = create_proxy(start_solo)
js.document.getElementById("submit-ans").onclick = create_proxy(check_user_answer)
js.document.getElementById("exit-game").onclick = create_proxy(lambda e: update_ui())
js.document.getElementById("do-logout").onclick = create_proxy(lambda e: (js.localStorage.removeItem("user"), update_ui()))
js.document.getElementById("auth-back").onclick = create_proxy(lambda e: update_ui())

update_ui()
</script>
</body>
</html>
