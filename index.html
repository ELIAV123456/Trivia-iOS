<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Pro - The Original Style</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { 
            --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; 
            --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; --gold: #ffd700;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; position: relative; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; max-height: 80vh; overflow-y: auto; }
        .active { display: flex; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        .btn-green { background: var(--green); }
        .btn-blue { background: var(--blue); }
        .btn-purple { background: var(--purple); }
        .btn-exit { background: var(--exit); }
        .room-item { background: #33334d; padding: 15px; border-radius: 15px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #555; }
        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 10px 0; min-height: 90px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 1px solid #444; }
        .settings-btn { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 24px; cursor: pointer; z-index: 10; }
        .flash-green { background: #1b4d1b !important; }
        .flash-red { background: #4d1b1b !important; }
        .waiting-text { color: var(--orange); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <button id="settings-open" class="settings-btn">⚙️</button>
        
        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Pro</h1>
            <p id="hello-user" style="color:var(--blue); font-weight:bold;"></p>
            <div id="logged-in-ui" style="display:none">
                <button class="btn-green" id="start-normal-btn">משחק רגיל</button>
                <button class="btn-purple" id="go-lobby-btn">⚔️ קרב 1 על 1</button>
                <button style="background:var(--orange)" id="go-scores-btn">🏆 לוח תוצאות</button>
                <button class="btn-exit" id="logout-btn">התנתק</button>
            </div>
            <div id="logged-out-ui">
                <button class="btn-green" id="go-login">כניסה</button>
                <button class="btn-blue" id="go-reg">הרשמה</button>
            </div>
        </div>

        <div id="lobby-screen" class="screen">
            <h2>⚔️ לובי PVP</h2>
            <button class="btn-green" id="create-room-btn">➕ צור חדר חדש</button>
            <div id="rooms-list" style="margin: 15px 0; min-height: 100px;"></div>
            <button style="background:#555" id="lobby-back">חזרה</button>
        </div>

        <div id="settings-screen" class="screen">
            <h2>הגדרות פרופיל</h2>
            <label>שם משתמש:</label>
            <input type="text" id="set-name" placeholder="שם חדש">
            <label>אימוג'י אישי (מהמקלדת):</label>
            <input type="text" id="set-emoji" placeholder="הכנס אימוג'י 🧐" maxlength="2">
            <button class="btn-green" id="save-settings">שמור וסגור</button>
            <button style="background:#555" id="settings-back">ביטול</button>
        </div>

        <div id="score-screen" class="screen">
            <h1>🏆 Top 10</h1>
            <div id="leaderboard-content" style="text-align: right; margin-bottom: 10px;"></div>
            <button style="background:#555" id="score-back">חזרה</button>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="q-count">1/10</span>
                <span id="timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="game-ans" placeholder="הקלד תשובה...">
            <button class="btn-green" id="game-submit">בדוק תשובה</button>
        </div>

        <div id="auth-screen" class="screen">
            <h2 id="auth-title">כניסה</h2>
            <input type="text" id="auth-u" placeholder="שם משתמש">
            <input type="password" id="auth-p" placeholder="סיסמה">
            <button class="btn-green" id="auth-btn">אישור</button>
            <button style="background:#555" id="auth-back">חזרה</button>
        </div>
    </div>

    <script type="py">
import js, hashlib, random, json, re, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB_URL = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, idx, score, timer_val, timer_event = [], 0, 0, 15, None
current_room_id, is_pvp, i_am_p1, game_active, lobby_loop = None, False, False, False, None

def switch_screen(sid):
    global lobby_loop
    # הסתרת גלגל שיניים במשחק/כניסה
    js.document.getElementById("settings-open").style.display = "block" if sid in ["menu-screen", "lobby-screen", "score-screen"] else "none"
    if sid != "lobby-screen" and lobby_loop:
        js.clearInterval(lobby_loop)
        lobby_loop = None
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")

def update_menu():
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("hello-user").innerText = f"{em} {u}" if u else ""
    js.document.getElementById("logged-in-ui").style.display = "block" if u else "none"
    js.document.getElementById("logged-out-ui").style.display = "none" if u else "block"

async def load_q():
    res = await pyfetch(f"{DB_URL}questions.json")
    data = await res.json()
    if isinstance(data, list): return [q for q in data if q]
    if isinstance(data, dict): return data.get("questions", list(data.values()))
    return []

async def open_lobby(e=None):
    global lobby_loop
    switch_screen("lobby-screen")
    await refresh_lobby()
    lobby_loop = js.setInterval(create_proxy(lambda: asyncio.ensure_future(refresh_lobby())), 4000)

async def refresh_lobby():
    res = await pyfetch(f"{DB_URL}rooms.json")
    rooms = await res.json() if res.status == 200 else {}
    container = js.document.getElementById("rooms-list")
    container.innerHTML = ""
    if rooms and isinstance(rooms, dict):
        for rid, rd in rooms.items():
            if rd.get("status") == "waiting":
                div = js.document.createElement("div")
                div.className = "room-item"
                div.innerHTML = f"<span>{rd.get('p1_emoji','👤')} <b>{rd.get('player1')}</b> מחכה</span><button style='width:auto; padding:5px 15px; background:var(--blue)'>כנס</button>"
                div.onclick = create_proxy(lambda e, r=rid: asyncio.ensure_future(join_room(r)))
                container.appendChild(div)
    if not container.innerHTML: container.innerHTML = "<p style='color:#777'>אין חדרים פתוחים...</p>"

async def create_room(e=None):
    global current_room_id, i_am_p1, questions, is_pvp, game_active
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    all_q = await load_q()
    is_pvp, i_am_p1, game_active = True, True, False
    questions = random.sample(all_q, 10)
    current_room_id = f"room_{int(js.Date.now())}"
    
    await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PUT", body=json.dumps({
        "player1": u, "p1_emoji": em, "status": "waiting", "questions": questions,
        "p1_score": -1, "p2_score": -1, "last_pulse": int(js.Date.now())
    }))
    
    switch_screen("game-screen")
    js.document.getElementById("q-text").innerHTML = "<div class='waiting-text'>ממתין ליריב שייכנס...</div>"
    js.document.getElementById("game-submit").disabled = True # חסימת כפתור
    asyncio.ensure_future(wait_loop())

async def join_room(rid):
    global current_room_id, i_am_p1, questions, is_pvp, game_active
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    await pyfetch(f"{DB_URL}rooms/{rid}.json", method="PATCH", body=json.dumps({
        "player2": u, "p2_emoji": em, "status": "active"
    }))
    d = await (await pyfetch(f"{DB_URL}rooms/{rid}.json")).json()
    questions, current_room_id, i_am_p1, is_pvp, game_active = d['questions'], rid, False, True, True
    switch_screen("game-screen")
    js.document.getElementById("game-submit").disabled = False
    start_quiz()

async def wait_loop():
    global game_active
    while not game_active and current_room_id:
        await asyncio.sleep(2)
        d = await (await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")).json()
        if d and d.get("status") == "active":
            game_active = True
            js.document.getElementById("game-submit").disabled = False # שחרור כפתור
            start_quiz()

def start_quiz():
    global idx, score
    idx, score = 0, 0
    show_q()

def show_q():
    global timer_val, timer_event
    if idx >= 10:
        js.alert(f"הסתיים! ציון: {score}")
        switch_screen("menu-screen")
        return
    js.document.getElementById("q-count").innerText = f"{idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[idx]['q']
    js.document.getElementById("game-ans").value = ""
    timer_val = 15
    if timer_event: js.clearInterval(timer_event)
    timer_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(timer_tick())), 1000)

async def timer_tick():
    global timer_val
    timer_val -= 1
    js.document.getElementById("timer").innerText = f"⏱️ {timer_val}"
    if timer_val <= 0: await check_ans()

async def check_ans(e=None):
    global idx, score, timer_event
    if timer_event: js.clearInterval(timer_event)
    ans = js.document.getElementById("game-ans").value.strip().lower()
    corr = str(questions[idx]['a']).lower()
    if ans == corr:
        score += 1
        js.document.body.classList.add("flash-green")
    else:
        js.document.body.classList.add("flash-red")
    
    js.setTimeout(create_proxy(lambda: (js.document.body.classList.remove("flash-green"), js.document.body.classList.remove("flash-red"))), 400)
    idx += 1
    show_q()

async def show_scores(e=None):
    switch_screen("score-screen")
    container = js.document.getElementById("leaderboard-content")
    container.innerHTML = "טוען..."
    res = await pyfetch(f"{DB_URL}users.json")
    users = await res.json()
    if users:
        sorted_u = sorted(users.items(), key=lambda x: x[1].get('points', 0), reverse=True)
        h = ""
        for i, (name, data) in enumerate(sorted_u[:10]):
            h += f"<div style='padding:10px; border-bottom:1px solid #444; display:flex; justify-content:space-between;'>"
            h += f"<span>{i+1}. {name}</span><span>{int(data.get('points',0))}</span></div>"
        container.innerHTML = h

async def save_settings(e=None):
    u_new = js.document.getElementById("set-name").value.strip()
    em_new = js.document.getElementById("set-emoji").value.strip()
    if u_new: js.localStorage.setItem("user", u_new)
    if em_new: js.localStorage.setItem("emoji", em_new)
    update_menu()
    switch_screen("menu-screen")

# כפתורים
js.document.getElementById("start-normal-btn").onclick = lambda e: asyncio.ensure_future(start_normal())
js.document.getElementById("go-lobby-btn").onclick = lambda e: asyncio.ensure_future(open_lobby())
js.document.getElementById("create-room-btn").onclick = lambda e: asyncio.ensure_future(create_room())
js.document.getElementById("go-scores-btn").onclick = lambda e: asyncio.ensure_future(show_scores())
js.document.getElementById("save-settings").onclick = lambda e: asyncio.ensure_future(save_settings())
js.document.getElementById("game-submit").onclick = lambda e: asyncio.ensure_future(check_ans())
js.document.getElementById("settings-open").onclick = lambda e: switch_screen("settings-screen")
js.document.getElementById("settings-back").onclick = lambda e: switch_screen("menu-screen")
js.document.getElementById("score-back").onclick = lambda e: switch_screen("menu-screen")
js.document.getElementById("lobby-back").onclick = lambda e: switch_screen("menu-screen")
js.document.getElementById("logout-btn").onclick = lambda e: (js.localStorage.removeItem("user"), update_menu())

async def start_normal():
    global questions, idx, score, is_pvp, game_active
    all_q = await load_q()
    questions = random.sample(all_q, 10)
    idx, score, is_pvp, game_active = 0, 0, False, True
    switch_screen("game-screen")
    js.document.getElementById("game-submit").disabled = False
    start_quiz()

# Auth (כניסה/הרשמה)
def open_auth(mode):
    js.document.getElementById("auth-title").innerText = "כניסה" if mode == "login" else "הרשמה"
    switch_screen("auth-screen")

js.document.getElementById("go-login").onclick = lambda e: open_auth("login")
js.document.getElementById("go-reg").onclick = lambda e: open_auth("reg")
js.document.getElementById("auth-back").onclick = lambda e: switch_screen("menu-screen")

async def handle_auth(e):
    u = js.document.getElementById("auth-u").value.strip()
    p = js.document.getElementById("auth-p").value.strip()
    hp = hashlib.sha256(p.encode()).hexdigest()
    if js.document.getElementById("auth-title").innerText == "כניסה":
        res = await pyfetch(f"{DB_URL}users/{u}.json")
        d = await res.json()
        if d and d.get("password") == hp:
            js.localStorage.setItem("user", u)
            update_menu()
    else:
        await pyfetch(f"{DB_URL}users/{u}.json", method="PUT", body=json.dumps({"password": hp, "points": 0}))
        js.localStorage.setItem("user", u)
        update_menu()

js.document.getElementById("auth-btn").onclick = lambda e: asyncio.ensure_future(handle_auth(e))

update_menu()
    </script>
</body>
</html>
