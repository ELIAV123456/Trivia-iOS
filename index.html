<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Quiz V2.2</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #1e1e2e; --card: #2a2a3d; --green: #4CAF50; --blue: #2196F3; --orange: #FF9800; --exit: #ff5555; --purple: #9c27b0; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #444; position: relative; }
        .screen { display: none; flex-direction: column; max-height: 80vh; overflow-y: auto; }
        .active { display: flex; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #444; background: #3a3a4d; color: white; text-align: center; font-size: 16px; outline: none; }
        button { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-exit { background: var(--exit); }
        .room-item { background: #33334d; padding: 15px; border-radius: 15px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #555; }
        .q-card { background: #33334d; padding: 20px; border-radius: 15px; margin: 10px 0; min-height: 90px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 1px solid #444; }
        
        .settings-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; font-size: 26px; cursor: pointer; display: none; z-index: 10; }
        
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 15px 0; }
        .emoji-opt { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 10px; border: 2px solid transparent; }
        .emoji-active { border-color: var(--blue); background: rgba(33, 150, 243, 0.2); }
        
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 10px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <button id="settings-open" class="settings-btn">⚙️</button>
        
        <div id="menu-screen" class="screen active">
            <h1>🎮 Trivia Quiz</h1>
            <p id="hello-user" style="color:var(--blue); font-weight:bold;"></p>
            <div id="logged-in-ui" style="display:none">
                <button class="btn-green" id="start-normal-btn">משחק רגיל</button>
                <button class="btn-purple" id="go-lobby-btn">⚔️ לובי PVP</button>
                <button class="btn-exit" id="logout-btn">התנתק</button>
            </div>
            <div id="logged-out-ui">
                <button class="btn-green" id="go-auth-login">כניסה</button>
                <button class="btn-blue" id="go-auth-reg" style="background:var(--blue)">הרשמה</button>
            </div>
        </div>

        <div id="lobby-screen" class="screen">
            <h2>⚔️ לובי PVP <span id="lobby-loader" class="loader" style="display:none"></span></h2>
            <button class="btn-green" id="create-room-btn">➕ צור חדר חדש</button>
            <div id="rooms-list" style="margin: 15px 0; min-height: 100px;"></div>
            <button style="background:#555" id="lobby-back">חזרה</button>
        </div>

        <div id="settings-screen" class="screen">
            <h2>הגדרות פרופיל</h2>
            <input type="text" id="set-name" placeholder="שם חדש">
            <div class="emoji-grid" id="emoji-container"></div>
            <button class="btn-green" id="save-settings">שמור שינויים</button>
            <button style="background:#555" id="settings-back">ביטול</button>
        </div>

        <div id="game-screen" class="screen">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="q-count">1/10</span>
                <span id="timer" style="color:var(--orange)">⏱️ 15</span>
            </div>
            <div class="q-card" id="q-text">טוען...</div>
            <input type="text" id="game-ans" placeholder="הקלד תשובה...">
            <button class="btn-green" id="game-submit">שלח תשובה</button>
            <button id="cancel-room-btn" class="btn-exit" style="display:none; margin-top:5px; background:#666;">ביטול ויציאה מהחדר</button>
        </div>
    </div>

    <script type="py">
import js, hashlib, random, json, re, asyncio
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

DB_URL = "https://triviaquizapp-8b15c-default-rtdb.firebaseio.com/"
questions, idx, score, timer_val, timer_event = [], 0, 0, 15, None
current_room_id, is_pvp, i_am_p1, game_active, lobby_loop = None, False, False, False, None
selected_emoji = js.localStorage.getItem("emoji") or "👤"
EMOJIS = ["🦁","🥷","🤖","🦄","🐯","🐸","🐱","🐶","🦊","🐼","🐨","🐝","🎨","🚀","🎸","🍕","⚽","🎮","👑","🔥","💎","👻","👾","😎"]

def build_emoji_picker():
    cont = js.document.getElementById("emoji-container")
    cont.innerHTML = ""
    for em in EMOJIS:
        span = js.document.createElement("span")
        span.className = "emoji-opt" + (" emoji-active" if em == selected_emoji else "")
        span.innerText = em
        span.onclick = create_proxy(lambda e, val=em: pick_emoji(val))
        cont.appendChild(span)

def pick_emoji(val):
    global selected_emoji
    selected_emoji = val
    build_emoji_picker()

def switch_screen(sid):
    global lobby_loop
    # הצגת הגדרות רק בתפריט הראשי
    js.document.getElementById("settings-open").style.display = "block" if sid == "menu-screen" else "none"
    
    if sid != "lobby-screen" and lobby_loop:
        js.clearInterval(lobby_loop)
        lobby_loop = None
    for s in js.document.querySelectorAll(".screen"): s.classList.remove("active")
    js.document.getElementById(sid).classList.add("active")

def update_menu():
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    js.document.getElementById("hello-user").innerText = f"{em} {u}" if u else ""
    js.document.getElementById("logged-in-ui").style.display = "block" if u else "none"
    js.document.getElementById("logged-out-ui").style.display = "none" if u else "block"
    switch_screen("menu-screen")

async def load_questions():
    try:
        res = await pyfetch(f"{DB_URL}questions.json")
        data = await res.json()
        if isinstance(data, list): return [q for q in data if q]
        if isinstance(data, dict): return data.get("questions", list(data.values()))
        return []
    except: return []

async def cancel_and_exit(e=None):
    global current_room_id, game_active
    if current_room_id and i_am_p1:
        await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="DELETE")
    current_room_id = None
    game_active = False
    update_menu()

async def create_room(e=None):
    global current_room_id, i_am_p1, questions, is_pvp, game_active
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    all_q = await load_questions()
    if not all_q: return
    
    is_pvp, i_am_p1, game_active = True, True, False
    questions = random.sample(all_q, min(10, len(all_q)))
    current_room_id = f"room_{int(js.Date.now())}"
    
    await pyfetch(f"{DB_URL}rooms/{current_room_id}.json", method="PUT", body=json.dumps({
        "player1": u, "p1_emoji": em, "status": "waiting", "questions": questions,
        "p1_score": -1, "p2_score": -1, "last_pulse": int(js.Date.now())
    }))
    
    switch_screen("game-screen")
    js.document.getElementById("q-text").innerText = "ממתין ליריב שיצטרף..."
    # חוסם כפתור ומציג ביטול
    js.document.getElementById("game-submit").disabled = True
    js.document.getElementById("cancel-room-btn").style.display = "block"
    
    asyncio.ensure_future(wait_loop())

async def join_room(rid):
    global current_room_id, i_am_p1, questions, is_pvp, game_active
    u = js.localStorage.getItem("user")
    em = js.localStorage.getItem("emoji") or "👤"
    await pyfetch(f"{DB_URL}rooms/{rid}.json", method="PATCH", body=json.dumps({
        "player2": u, "p2_emoji": em, "status": "active"
    }))
    d = await (await pyfetch(f"{DB_URL}rooms/{rid}.json")).json()
    questions, current_room_id, i_am_p1, is_pvp, game_active = d['questions'], rid, False, True, True
    switch_screen("game-screen")
    js.document.getElementById("game-submit").disabled = False
    js.document.getElementById("cancel-room-btn").style.display = "none"
    start_quiz()

async def wait_loop():
    global game_active
    while not game_active and current_room_id:
        await asyncio.sleep(2)
        res = await pyfetch(f"{DB_URL}rooms/{current_room_id}.json")
        d = await res.json()
        if d and d.get("status") == "active":
            game_active = True
            js.document.getElementById("game-submit").disabled = False
            js.document.getElementById("cancel-room-btn").style.display = "none"
            start_quiz()
        elif not d: break # חדר נמחק

def start_quiz():
    global idx, score
    idx, score = 0, 0
    show_q()

def show_q():
    global timer_val, timer_event
    if idx >= 10: 
        asyncio.ensure_future(finish_game())
        return
    js.document.getElementById("q-count").innerText = f"{idx+1}/10"
    js.document.getElementById("q-text").innerText = questions[idx]['q']
    js.document.getElementById("game-ans").value = ""
    timer_val = 15
    if timer_event: js.clearInterval(timer_event)
    timer_event = js.setInterval(create_proxy(lambda: asyncio.ensure_future(timer_tick())), 1000)

async def finish_game():
    u = js.localStorage.getItem("user")
    if u:
        r = await pyfetch(f"{DB_URL}users/{u}.json")
        d = await r.json()
        p = (d.get("points", 0) if d else 0) + score
        await pyfetch(f"{DB_URL}users/{u}.json", method="PATCH", body=json.dumps({"points": p}))
    js.alert(f"הסתיים! צברת {score} נקודות.")
    update_menu()

async def timer_tick():
    global timer_val
    timer_val -= 1
    js.document.getElementById("timer").innerText = f"⏱️ {timer_val}"
    if timer_val <= 0: await check_ans()

async def check_ans(e=None):
    global idx, score, timer_event
    if timer_event: js.clearInterval(timer_event)
    ans = js.document.getElementById("game-ans").value.strip().lower()
    corr = str(questions[idx]['a']).lower()
    if ans == corr and ans != "":
        score += 1
        js.document.body.style.background = "green"
    else: js.document.body.style.background = "red"
    js.setTimeout(create_proxy(lambda: setattr(js.document.body.style, 'background', '#1e1e2e')), 400)
    idx += 1
    show_q()

async def open_lobby(e=None):
    global lobby_loop
    switch_screen("lobby-screen")
    await refresh_lobby()
    lobby_loop = js.setInterval(create_proxy(lambda: asyncio.ensure_future(refresh_lobby())), 4000)

async def refresh_lobby():
    js.document.getElementById("lobby-loader").style.display = "inline-block"
    res = await pyfetch(f"{DB_URL}rooms.json")
    rooms = await res.json() if res.status == 200 else {}
    container = js.document.getElementById("rooms-list")
    container.innerHTML = ""
    if rooms and isinstance(rooms, dict):
        for rid, rd in rooms.items():
            if rd.get("status") == "waiting":
                div = js.document.createElement("div")
                div.className = "room-item"
                div.innerHTML = f"<span>{rd.get('p1_emoji','👤')} <b>{rd.get('player1')}</b></span><button style='width:auto; padding:5px 15px; background:var(--blue)'>הכנס</button>"
                div.onclick = create_proxy(lambda e, r=rid: asyncio.ensure_future(join_room(r)))
                container.appendChild(div)
    js.document.getElementById("lobby-loader").style.display = "none"

# חיווט כפתורים
js.document.getElementById("go-lobby-btn").onclick = lambda e: asyncio.ensure_future(open_lobby())
js.document.getElementById("create-room-btn").onclick = lambda e: asyncio.ensure_future(create_room())
js.document.getElementById("cancel-room-btn").onclick = lambda e: asyncio.ensure_future(cancel_and_exit())
js.document.getElementById("settings-open").onclick = lambda e: (build_emoji_picker(), switch_screen("settings-screen"))
js.document.getElementById("save-settings").onclick = lambda e: (js.localStorage.setItem("emoji", selected_emoji), js.localStorage.setItem("user", js.document.getElementById("set-name").value or js.localStorage.getItem("user")), update_menu())
js.document.getElementById("game-submit").onclick = lambda e: asyncio.ensure_future(check_ans())
js.document.getElementById("settings-back").onclick = lambda e: update_menu()
js.document.getElementById("lobby-back").onclick = lambda e: update_menu()
js.document.getElementById("logout-btn").onclick = lambda e: (js.localStorage.removeItem("user"), update_menu())
js.document.getElementById("start-normal-btn").onclick = lambda e: asyncio.ensure_future(create_room())

update_menu()
    </script>
</body>
</html>
